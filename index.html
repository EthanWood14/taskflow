<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow</title>
<meta name="theme-color" content="#6d5dfc" />
<meta name="description" content="TaskFlow — a fast, private task manager you can run locally or on the web." />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='112'%20fill='%236d5dfc'/%3E%3Cpath%20d='M150%20268l70%2070%20142-152'%20fill='none'%20stroke='%23fff'%20stroke-width='46'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='112'%20fill='%236d5dfc'/%3E%3Cpath%20d='M150%20268l70%2070%20142-152'%20fill='none'%20stroke='%23fff'%20stroke-width='46'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="TaskFlow" />
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f6f7fb;
    --sidebar: #f4f3ff;
    --sidebar-grad: linear-gradient(180deg, #f3f1ff 0%, #eef4ff 100%);
    --border: #e8e8f2;
    --text: #1b1b2b;
    --text-dim: #6b6b80;
    --text-faint: #a6a6ba;
    --accent: #6d5dfc;
    --accent-2: #9b8cff;
    --brand-grad: linear-gradient(135deg, #6d5dfc 0%, #9163ff 100%);
    --accent-soft: #ece9ff;
    --hover: #eeedf7;
    --selected: #e7e3ff;
    --p1: #ef4444;
    --p2: #f59e0b;
    --p3: #3b82f6;
    --p4: #b3b3c4;
    --green: #10b981;
    --shadow: 0 8px 30px rgba(60,50,120,.14);
    --shadow-sm: 0 2px 8px rgba(60,50,120,.08);
    --radius: 12px;
  }
  [data-theme="dark"] {
    --bg: #15151f;
    --bg-alt: #1d1d2b;
    --sidebar: #171722;
    --sidebar-grad: linear-gradient(180deg, #1a1726 0%, #14141f 100%);
    --border: #2c2c3d;
    --text: #ececf5;
    --text-dim: #9a9ab0;
    --text-faint: #62627a;
    --accent: #8b7bff;
    --accent-2: #a99bff;
    --brand-grad: linear-gradient(135deg, #7c6bff 0%, #9d6dff 100%);
    --accent-soft: #2a2540;
    --hover: #242434;
    --selected: #2e294a;
    --green: #34d399;
    --shadow: 0 10px 36px rgba(0,0,0,.5);
    --shadow-sm: 0 2px 10px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ===== Sidebar ===== */
  #sidebar {
    width: 284px;
    min-width: 284px;
    background: var(--sidebar-grad);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform .26s cubic-bezier(.4,0,.2,1);
  }
  #sidebar.collapsed { margin-left: -284px; }
  .sb-header {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 16px 10px;
  }
  .logo { font-weight: 800; font-size: 19px; letter-spacing: -.4px; display: flex; align-items: center; gap: 9px;
    background: var(--brand-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .logo .dot { width: 28px; height: 28px; border-radius: 9px; background: var(--brand-grad); color: #fff; display: grid; place-items: center; font-size: 15px; -webkit-text-fill-color: #fff; box-shadow: 0 4px 12px rgba(109,93,252,.4); }
  .sb-header .spacer { flex: 1; }
  .icon-btn { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; color: var(--text-dim); font-size: 15px; transition: background .12s, color .12s; }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .sb-scroll { flex: 1; overflow-y: auto; padding: 6px 10px 30px; }
  .add-task-btn {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    width: 100%; padding: 11px 8px; margin: 4px 0 12px;
    color: #fff; font-weight: 700; border-radius: 11px;
    background: var(--brand-grad); box-shadow: 0 6px 18px rgba(109,93,252,.32);
    transition: transform .1s, box-shadow .15s;
  }
  .add-task-btn:hover { transform: translateY(-1px); box-shadow: 0 9px 24px rgba(109,93,252,.42); }
  .add-task-btn:active { transform: translateY(0); }
  .add-task-btn .plus { font-size: 18px; line-height: 1; font-weight: 400; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 11px; border-radius: 11px; color: var(--text);
    cursor: pointer; user-select: none; position: relative;
    transition: background .12s;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--bg); font-weight: 600; box-shadow: var(--shadow-sm); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:18px; border-radius:3px; background: var(--brand-grad); }
  .nav-item .ico { width: 20px; text-align: center; font-size: 15px; color: var(--text-dim); flex-shrink: 0; }
  .nav-item.active .ico { color: var(--accent); }
  .nav-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-item .count { color: var(--text-faint); font-size: 12px; }
  .nav-item .proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin: 0 5px; }
  .sb-section-head {
    display: flex; align-items: center; gap: 4px;
    padding: 14px 8px 4px; color: var(--text-dim);
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  }
  .sb-section-head .spacer { flex: 1; }
  .sb-section-head .icon-btn { width: 24px; height: 24px; font-size: 13px; opacity: 0; transition: opacity .1s; }
  .sb-section-head:hover .icon-btn { opacity: 1; }
  .caret { transition: transform .15s; font-size: 11px; color: var(--text-faint); cursor: pointer; }
  .caret.collapsed { transform: rotate(-90deg); }

  /* ===== Main ===== */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-bottom: 1px solid transparent;
    min-height: 48px;
  }
  .topbar .crumbs { color: var(--text-dim); font-size: 13px; flex: 1; display: flex; align-items: center; gap: 6px; }
  .topbar .icon-btn { color: var(--text-dim); }
  .search-box {
    display: flex; align-items: center; gap: 7px;
    background: var(--hover); border-radius: 7px; padding: 6px 11px;
    width: 230px; color: var(--text-dim);
  }
  .search-box input { background: none; border: none; outline: none; flex: 1; width: 100%; }
  .view-scroll { flex: 1; overflow-y: auto; }
  .view-inner { max-width: 800px; margin: 0 auto; padding: 8px 24px 120px; }
  .board-inner { padding: 8px 24px 40px; height: 100%; }
  .view-title-row { display: flex; align-items: center; gap: 10px; padding: 16px 0 6px; }
  .view-title { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
  .view-title .emoji { margin-right: 6px; }
  .view-sub { color: var(--text-dim); font-size: 13px; padding-bottom: 8px; }
  .view-actions { margin-left: auto; display: flex; gap: 4px; }
  .seg { display: inline-flex; background: var(--hover); border-radius: 7px; padding: 2px; }
  .seg button { padding: 5px 12px; border-radius: 5px; color: var(--text-dim); font-weight: 600; font-size: 13px; }
  .seg button.active { background: var(--bg); color: var(--accent); box-shadow: var(--shadow-sm); }

  /* ===== Task list ===== */
  .task-group-head {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 14px; padding: 18px 0 4px;
    border-bottom: 1px solid var(--border); margin-bottom: 2px;
  }
  .task-group-head .gcount { color: var(--text-faint); font-weight: 500; font-size: 13px; }
  .task-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 12px; border-bottom: 1px solid var(--border);
    position: relative; cursor: pointer; border-radius: 12px;
    transition: background .12s, box-shadow .12s;
  }
  .task-row:hover { background: var(--bg); box-shadow: var(--shadow-sm); border-bottom-color: transparent; }
  .task-row.dragging { opacity: .4; }
  .task-row.subtask { margin-left: 30px; }
  .checkbox {
    width: 21px; height: 21px; min-width: 21px; margin-top: 1px;
    border: 2px solid var(--text-faint); border-radius: 7px;
    display: grid; place-items: center; color: transparent; font-size: 12px;
    transition: all .14s; cursor: pointer;
  }
  .checkbox:hover { color: var(--text-faint); border-color: var(--accent); }
  .checkbox.p1 { border-color: var(--p1); background: rgba(239,68,68,.1); }
  .checkbox.p2 { border-color: var(--p2); background: rgba(245,158,11,.12); }
  .checkbox.p3 { border-color: var(--p3); background: rgba(59,130,246,.12); }
  .checkbox.done { background: var(--accent); border-color: var(--accent); color: #fff; }
  .checkbox.p1.done { background: var(--p1); border-color: var(--p1); }
  .checkbox.p2.done { background: var(--p2); border-color: var(--p2); }
  .checkbox.p3.done { background: var(--p3); border-color: var(--p3); }
  .task-body { flex: 1; min-width: 0; }
  .task-title { word-break: break-word; }
  .task-row.completed .task-title { color: var(--text-faint); text-decoration: line-through; }
  .task-desc { color: var(--text-dim); font-size: 13px; margin-top: 1px; white-space: pre-wrap; word-break: break-word; }
  .task-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; margin-top: 4px; font-size: 12px; }
  .meta-chip { display: inline-flex; align-items: center; gap: 4px; color: var(--text-dim); }
  .meta-chip.due { color: var(--green); }
  .meta-chip.overdue { color: var(--p1); }
  .meta-chip.today { color: var(--green); }
  .label-chip { background: var(--hover); padding: 1px 7px; border-radius: 10px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
  .proj-chip { display: inline-flex; align-items: center; gap: 5px; color: var(--text-dim); margin-left: auto; }
  .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .1s; }
  .task-row:hover .task-actions { opacity: 1; }
  .task-actions .icon-btn { width: 26px; height: 26px; font-size: 13px; }
  .subcount { color: var(--text-faint); font-size: 12px; display: inline-flex; align-items: center; gap: 3px; }
  .empty-state { text-align: center; color: var(--text-faint); padding: 60px 20px; }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* inline add */
  .inline-add { padding: 6px 2px; }
  .inline-add-trigger { display: flex; align-items: center; gap: 10px; color: var(--text-dim); padding: 7px 2px; border-radius: 6px; cursor: pointer; }
  .inline-add-trigger:hover { color: var(--accent); }
  .inline-add-trigger .plus { color: var(--accent); font-size: 18px; width: 20px; text-align: center; }

  /* ===== Board (Kanban) ===== */
  .board { display: flex; gap: 14px; align-items: flex-start; height: 100%; overflow-x: auto; padding-bottom: 12px; }
  .board-col {
    background: var(--bg-alt); border: 1px solid var(--border);
    border-radius: 16px; width: 300px; min-width: 300px;
    display: flex; flex-direction: column; max-height: 100%;
  }
  .board-col.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; background: var(--accent-soft); }
  .board-col-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; font-weight: 700; }
  .board-col-head .gcount { color: #fff; font-weight: 600; font-size: 12px; background: var(--accent-2); padding: 0 8px; border-radius: 10px; min-width: 20px; text-align: center; }
  .board-col-head .spacer { flex: 1; }
  .board-cards { padding: 4px 12px; overflow-y: auto; flex: 1; min-height: 20px; }
  .board-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 13px;
    padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow-sm);
    cursor: pointer; transition: transform .1s, box-shadow .15s;
  }
  .board-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .board-card.dragging { opacity: .4; }
  .board-card .bc-top { display: flex; align-items: flex-start; gap: 8px; }
  .board-card.completed .task-title { color: var(--text-faint); text-decoration: line-through; }
  .board-add { padding: 6px 12px 12px; color: var(--text-dim); cursor: pointer; border-radius: 6px; }
  .board-add:hover { color: var(--accent); }
  .add-col {
    min-width: 290px; padding: 12px; color: var(--text-dim);
    border-radius: 10px; cursor: pointer;
  }
  .add-col:hover { background: var(--bg-alt); color: var(--text); }

  /* priority flag colors */
  .flag-p1 { color: var(--p1); } .flag-p2 { color: var(--p2); } .flag-p3 { color: var(--p3); } .flag-p4 { color: var(--text-faint); }

  /* ===== Modal / detail ===== */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: grid; place-items: center; z-index: 100; padding: 20px; }
  .modal { background: var(--bg); border-radius: 18px; box-shadow: var(--shadow); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: modalIn .2s cubic-bezier(.4,0,.2,1); }
  .modal.wide { max-width: 680px; }
  @keyframes modalIn { from { opacity:0; transform: translateY(12px) scale(.98); } to { opacity:1; transform:none; } }
  @keyframes sheetIn { from { transform: translateY(100%); } to { transform:none; } }
  .modal-head { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 2; }
  .modal-head .crumbs { flex: 1; color: var(--text-dim); font-size: 13px; }
  .modal-body { padding: 18px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--bg); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 5px; }
  .field input[type=text], .field input[type=date], .field input[type=time], .field textarea, .field select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg); outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .row2 { display: flex; gap: 10px; }
  .row2 > * { flex: 1; }
  .btn { padding: 9px 18px; border-radius: 10px; font-weight: 600; transition: transform .1s, box-shadow .15s, filter .15s; }
  .btn.primary { background: var(--brand-grad); color: #fff; box-shadow: 0 4px 14px rgba(109,93,252,.3); }
  .btn.primary:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn.ghost { color: var(--text-dim); }
  .btn.ghost:hover { background: var(--hover); }
  .btn.danger { color: var(--p1); }
  .btn.danger:hover { background: var(--accent-soft); }
  .btn.complete-forever { color: var(--green); border: 1px solid var(--green); background: transparent; }
  .btn.complete-forever:hover { background: var(--green); color: #fff; }

  .pri-picker, .label-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .pri-opt, .label-opt { padding: 5px 11px; border: 1px solid var(--border); border-radius: 16px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .pri-opt.sel, .label-opt.sel { border-color: var(--accent); background: var(--accent-soft); }
  .color-swatch { width: 16px; height: 16px; border-radius: 50%; }

  /* quick add modal */
  .qa-input { width: 100%; font-size: 17px; border: none; outline: none; background: none; padding: 4px 0; font-weight: 500; }
  .qa-desc { width: 100%; border: none; outline: none; background: none; resize: none; color: var(--text-dim); min-height: 40px; }
  .qa-chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0 4px; }
  .qa-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text-dim); }
  .qa-chip:hover { border-color: var(--text-faint); }
  .qa-chip.set { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }
  .qa-hint { color: var(--text-faint); font-size: 12px; margin-top: 8px; }
  .qa-hint code { background: var(--hover); padding: 1px 5px; border-radius: 4px; }

  /* subtasks & comments in detail */
  .detail-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin: 20px 0 8px; }
  .subtask-line { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .subtask-line .checkbox { width: 17px; height: 17px; min-width: 17px; }
  .subtask-line.done span { text-decoration: line-through; color: var(--text-faint); }
  .comment { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .comment .c-body { flex: 1; }
  .comment .c-meta { font-size: 12px; color: var(--text-faint); }
  .comment-add { display: flex; gap: 8px; margin-top: 10px; }
  .comment-add input { flex: 1; padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); outline: none; }

  .pill { font-size: 11px; padding: 1px 8px; border-radius: 10px; background: var(--hover); color: var(--text-dim); }
  .menu { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; box-shadow: var(--shadow); padding: 5px; z-index: 200; min-width: 180px; }
  .menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border-radius: 6px; text-align: left; }
  .menu button:hover { background: var(--hover); }
  .menu button.danger { color: var(--p1); }
  .menu .sep { height: 1px; background: var(--border); margin: 4px 0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2a2640; color: #fff; padding: 12px 20px; border-radius: 12px; box-shadow: var(--shadow); z-index: 400; display: flex; gap: 14px; align-items: center; font-size: 13px; }
  .toast button { color: var(--accent-2); font-weight: 700; }

  /* ===== Mobile drawer + bottom nav (hidden on desktop) ===== */
  #scrim { display: none; position: fixed; inset: 0; background: rgba(20,18,40,.5); z-index: 49; opacity: 0; transition: opacity .25s; }
  #scrim.show { display: block; opacity: 1; }
  #bottomnav { display: none; }
  .hamburger { display: none; }
  .topbar .brand-mini { display: none; }

  textarea.import-area { width: 100%; min-height: 280px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-alt); outline: none; white-space: pre; }
  .schema-box { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; white-space: pre; overflow-x: auto; max-height: 240px; overflow-y: auto; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .tabs button { padding: 8px 14px; color: var(--text-dim); font-weight: 600; border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  @media (max-width: 820px) {
    /* Sidebar becomes an off-canvas drawer */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
      width: 86vw; max-width: 320px; min-width: 0;
      transform: translateX(-100%); box-shadow: var(--shadow);
      border-right: none;
    }
    #sidebar.collapsed { margin-left: 0; }
    #app.drawer-open #sidebar { transform: translateX(0); }
    #main { width: 100%; }

    /* Topbar: hamburger + centered brand */
    .topbar { padding: 10px 14px; gap: 10px; min-height: 56px;
      position: sticky; top: 0; background: var(--bg); z-index: 20; border-bottom: 1px solid var(--border); }
    .hamburger { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 11px; font-size: 20px; color: var(--text); }
    .hamburger:active { background: var(--hover); }
    .topbar .brand-mini { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px;
      background: var(--brand-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .brand-mini .dot { width: 26px; height: 26px; border-radius: 8px; background: var(--brand-grad); color:#fff; -webkit-text-fill-color:#fff; display:grid; place-items:center; font-size:14px; box-shadow: 0 3px 9px rgba(109,93,252,.4); }
    .topbar .crumbs { display: none; }
    .topbar .search-box { display: none; }
    .topbar .desk-only { display: none; }
    .topbar .spacer-m { flex: 1; }
    .topbar .m-search-close { display: none; }
    /* Mobile search mode: full-width search field in the topbar */
    #app.m-search .topbar .hamburger,
    #app.m-search .topbar .brand-mini,
    #app.m-search .topbar .spacer-m { display: none; }
    #app.m-search .topbar .m-search-close { display: grid; }
    #app.m-search .topbar .search-box { display: flex; width: 100%; }

    /* Bottom tab bar */
    #bottomnav {
      display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 6px 4px calc(6px + env(safe-area-inset-bottom)); justify-content: space-around;
      box-shadow: 0 -4px 20px rgba(60,50,120,.08);
    }
    #bottomnav .bn-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 0; color: var(--text-dim); font-size: 10.5px; font-weight: 600; border-radius: 10px;
    }
    #bottomnav .bn-item .bn-ico { font-size: 20px; line-height: 1; }
    #bottomnav .bn-item.active { color: var(--accent); }
    #bottomnav .bn-item.bn-add .bn-ico {
      width: 46px; height: 46px; margin-top: -18px; border-radius: 16px; background: var(--brand-grad); color:#fff;
      display: grid; place-items: center; font-size: 26px; box-shadow: 0 6px 18px rgba(109,93,252,.45);
    }
    #bottomnav .bn-item.bn-add { color: var(--accent); }

    /* Give content room above the bottom bar */
    .view-inner { padding: 8px 16px 110px; max-width: 100%; }
    .board-inner { padding: 8px 14px 90px; }
    .view-scroll { -webkit-overflow-scrolling: touch; }
    .view-title { font-size: 26px; }
    .view-title-row { padding: 14px 0 6px; }

    /* Bigger touch targets */
    .task-row { padding: 13px 12px; gap: 14px; }
    .checkbox { width: 24px; height: 24px; min-width: 24px; }
    .task-actions { opacity: 1; }
    .task-actions .icon-btn { width: 34px; height: 34px; font-size: 15px; }
    .nav-item { padding: 12px 12px; }
    .icon-btn { width: 38px; height: 38px; }

    /* Board: full-width snapping columns */
    .board { gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .board-col { width: 82vw; min-width: 82vw; max-width: 360px; scroll-snap-align: start; }

    /* Modals become bottom sheets */
    .overlay { padding: 0; align-items: flex-end; }
    .modal, .modal.wide { max-width: 100%; width: 100%; max-height: 92vh;
      border-radius: 22px 22px 0 0; animation: sheetIn .26s cubic-bezier(.4,0,.2,1); }
    .modal-head::before { content:''; position:absolute; top:7px; left:50%; transform:translateX(-50%);
      width:40px; height:4px; border-radius:3px; background: var(--border); }
    .modal-head { padding-top: 20px; }
    .modal-body { padding: 16px; }
    .modal-foot { padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); flex-wrap: wrap; }
    .modal-foot .btn { flex: 1; min-width: 44%; text-align: center; padding: 12px 14px; }
    .row2 { flex-direction: column; gap: 0; }
    .qa-input { font-size: 16px; }   /* >=16px avoids iOS zoom-on-focus */
    .field input, .field textarea, .field select { font-size: 16px; padding: 12px; }
    .comment-add input { font-size: 16px; padding: 12px; }
  }

  @media (max-width: 400px) {
    #bottomnav .bn-item span.bn-label { display: none; }
    .view-title { font-size: 23px; }
  }
  /* ===== Karma widget ===== */
  .karma { background: var(--bg); border:1px solid var(--border); border-radius:12px; padding:9px 11px; margin:2px 0 10px; cursor:pointer; box-shadow: var(--shadow-sm); }
  .karma:hover { border-color: var(--accent); }
  .karma-top { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; margin-bottom:6px; }
  .karma-lvl { background:var(--brand-grad); color:#fff; padding:1px 8px; border-radius:8px; }
  .karma-streak { color:var(--text-dim); }
  .karma-xp { margin-left:auto; color:var(--text-dim); }
  .karma-bar { height:7px; background:var(--hover); border-radius:5px; overflow:hidden; }
  .karma-fill { height:100%; background:var(--brand-grad); border-radius:5px; transition:width .4s; }

  /* ===== Calendar ===== */
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-dow { text-align:center; font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; padding:4px 0; }
  .cal-cell { min-height:96px; border:1px solid var(--border); border-radius:10px; padding:5px; background:var(--bg-alt); overflow:hidden; transition:background .12s; }
  .cal-cell.empty { background:transparent; border:none; }
  .cal-cell.is-today { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .cal-cell.cal-dragover { background:var(--accent-soft); border-color:var(--accent); }
  .cal-daynum { font-size:12px; font-weight:700; color:var(--text-dim); margin-bottom:3px; }
  .cal-cell.is-today .cal-daynum { color:var(--accent); }
  .cal-chip { font-size:11px; padding:2px 6px; border-radius:6px; margin-bottom:3px; background:var(--bg); border-left:3px solid var(--p4); cursor:grab; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; box-shadow:var(--shadow-sm); }
  .cal-chip.p1 { border-left-color:var(--p1); } .cal-chip.p2 { border-left-color:var(--p2); } .cal-chip.p3 { border-left-color:var(--p3); }
  .cal-chip.dragging { opacity:.4; }
  .cal-more { font-size:10px; color:var(--text-faint); padding-left:3px; }

  /* ===== Matrix ===== */
  .mx-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .mx-quad { border:1px solid var(--border); border-radius:14px; background:var(--bg-alt); display:flex; flex-direction:column; min-height:200px; overflow:hidden; }
  .mx-quad.mx-dragover { outline:2px dashed var(--accent); outline-offset:-2px; }
  .mx-quad.q-do { border-top:4px solid var(--p1); } .mx-quad.q-sch { border-top:4px solid var(--p3); }
  .mx-quad.q-del { border-top:4px solid var(--p2); } .mx-quad.q-eli { border-top:4px solid var(--p4); }
  .mx-head { display:flex; align-items:center; gap:8px; padding:11px 14px 6px; font-size:14px; }
  .mx-head .mx-sub { color:var(--text-faint); font-size:11px; font-weight:500; }
  .mx-head .gcount { margin-left:auto; color:#fff; background:var(--accent-2); font-size:11px; padding:0 7px; border-radius:9px; }
  .mx-cards { padding:6px 10px 12px; flex:1; overflow-y:auto; }
  .mx-card { display:flex; align-items:center; gap:9px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:8px 10px; margin-bottom:7px; cursor:grab; box-shadow:var(--shadow-sm); }
  .mx-card.dragging { opacity:.4; }
  .mx-empty { color:var(--text-faint); text-align:center; padding:14px; }

  /* ===== Planner ===== */
  .pl-tray-wrap { background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:14px; }
  .pl-tray-label { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-dim); margin-bottom:7px; }
  .pl-tray { display:flex; flex-wrap:wrap; gap:7px; min-height:24px; }
  .pl-chip { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:6px 11px; font-size:13px; cursor:grab; box-shadow:var(--shadow-sm); }
  .pl-chip.dragging { opacity:.4; }
  .pl-grid { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .pl-row { display:flex; min-height:46px; border-bottom:1px solid var(--border); }
  .pl-row:last-child { border-bottom:none; }
  .pl-row.pl-dragover { background:var(--accent-soft); }
  .pl-time { width:74px; min-width:74px; padding:8px 10px; font-size:12px; color:var(--text-dim); border-right:1px solid var(--border); text-align:right; }
  .pl-slot { flex:1; padding:6px 8px; display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start; cursor:pointer; }
  .pl-task { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--p4); border-radius:8px; padding:5px 9px; font-size:13px; }
  .pl-task.p1 { border-left-color:var(--p1); } .pl-task.p2 { border-left-color:var(--p2); } .pl-task.p3 { border-left-color:var(--p3); }

  /* ===== Stats ===== */
  .stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin:6px 0 16px; }
  .stat-card { background:var(--bg-alt); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center; }
  .stat-ico { font-size:22px; }
  .stat-val { font-size:26px; font-weight:800; letter-spacing:-.5px; }
  .stat-label { font-size:12px; color:var(--text-dim); }
  .stat-panel { background:var(--bg-alt); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; }
  .stat-panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .stat-chart { position:relative; }
  .stat-chart svg rect { transition:height .3s, y .3s; }
  .stat-xlabels { position:relative; height:16px; margin-top:4px; }
  .stat-xlabels span { position:absolute; font-size:10px; color:var(--text-faint); transform:translateX(-50%); }
  .stat-prow { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .stat-pname { width:130px; min-width:130px; font-size:13px; display:flex; align-items:center; gap:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stat-pbar { flex:1; height:10px; background:var(--hover); border-radius:6px; overflow:hidden; }
  .stat-pbar div { height:100%; border-radius:6px; transition:width .4s; }
  .stat-pn { font-size:12px; color:var(--text-dim); width:30px; text-align:right; }

  /* ===== Heatmap ===== */
  .hm-wrap { display:flex; gap:3px; overflow-x:auto; padding-bottom:4px; }
  .hm-col { display:flex; flex-direction:column; gap:3px; }
  .hm-cell { width:13px; height:13px; border-radius:3px; background:var(--hover); }
  .hm-l1 { background:rgba(109,93,252,.35); } .hm-l2 { background:rgba(109,93,252,.55); }
  .hm-l3 { background:rgba(109,93,252,.78); } .hm-l4 { background:var(--accent); }
  .hm-future { opacity:.25; }
  .hm-legend { display:flex; align-items:center; gap:4px; justify-content:flex-end; font-size:11px; color:var(--text-faint); margin-top:8px; }
  .hm-legend .hm-cell { width:11px; height:11px; }

  /* ===== Achievements ===== */
  .ach-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .ach-card { border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; background:var(--bg-alt); transition:transform .12s; }
  .ach-card.got { border-color:var(--accent); box-shadow:var(--shadow-sm); }
  .ach-card.got:hover { transform:translateY(-3px); }
  .ach-card.locked { opacity:.6; filter:grayscale(.5); }
  .ach-icon { font-size:32px; margin-bottom:6px; }
  .ach-name { font-weight:700; font-size:14px; }
  .ach-desc { font-size:12px; color:var(--text-dim); margin-top:3px; }
  .ach-when { font-size:10.5px; color:var(--text-faint); margin-top:6px; }

  /* ===== Bulk bar ===== */
  .bulk-bar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); display:flex; gap:6px; align-items:center;
    background:var(--bg); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:14px; padding:8px 10px; z-index:300; flex-wrap:wrap; max-width:94vw; }
  .bulk-count { font-weight:700; padding:0 6px; color:var(--accent); }
  .bulk-btn { padding:7px 11px; border-radius:9px; font-weight:600; font-size:13px; background:var(--hover); }
  .bulk-btn:hover { background:var(--accent-soft); }
  .bulk-btn.danger { color:var(--p1); }
  .task-row.selected-row, .mx-card.selected-row, .board-card.selected-row { outline:2px solid var(--accent); outline-offset:-1px; background:var(--accent-soft); }

  /* ===== Command palette ===== */
  .cmd-overlay { align-items:flex-start; padding-top:12vh; }
  .cmd { background:var(--bg); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); width:100%; max-width:560px; overflow:hidden; animation:modalIn .15s ease; }
  .cmd-input { width:100%; padding:16px 18px; border:none; outline:none; font-size:17px; background:var(--bg); border-bottom:1px solid var(--border); }
  .cmd-list { max-height:50vh; overflow-y:auto; padding:6px; }
  .cmd-item { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:9px; cursor:pointer; }
  .cmd-item.sel { background:var(--accent-soft); }
  .cmd-ico { width:22px; text-align:center; }
  .cmd-lbl { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cmd-sub { font-size:11px; color:var(--text-faint); background:var(--hover); padding:1px 7px; border-radius:8px; }
  .cmd-empty { padding:18px; text-align:center; color:var(--text-faint); }
  .cmd-foot { padding:8px 14px; border-top:1px solid var(--border); font-size:11px; color:var(--text-faint); }

  /* ===== Focus / Pomodoro ===== */
  body.focus-mode #app { filter:saturate(.5) brightness(.96); }
  body.focus-mode #app::after { content:''; position:fixed; inset:0; background:rgba(20,18,40,.35); z-index:480; pointer-events:none; }
  #focus-bar { position:fixed; right:20px; bottom:20px; z-index:520; display:flex; align-items:center; gap:14px;
    background:var(--bg); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:16px; padding:12px 16px; max-width:92vw; }
  .fb-ring { position:relative; width:58px; height:58px; }
  .fb-ring svg { width:58px; height:58px; transform:rotate(-90deg); }
  .fb-bg { fill:none; stroke:var(--hover); stroke-width:3; }
  .fb-fg { fill:none; stroke:var(--accent); stroke-width:3; stroke-linecap:round; transition:stroke-dasharray .9s linear; }
  .fb-time { position:absolute; inset:0; display:grid; place-items:center; font-weight:800; font-size:14px; }
  .fb-task { font-weight:700; margin-bottom:6px; max-width:230px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fb-actions { display:flex; gap:6px; }
  .fb-actions button { padding:5px 12px; border-radius:8px; background:var(--hover); font-weight:600; }
  .fb-actions button:first-child { background:var(--brand-grad); color:#fff; }

  /* ===== Settings ===== */
  .preset-row { display:flex; gap:10px; flex-wrap:wrap; }
  .preset-sw { width:34px; height:34px; border-radius:10px; cursor:pointer; outline-offset:2px; }
  .preset-sw.sel { outline:2px solid var(--text); }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; }
  .toggle-row input { width:20px; height:20px; accent-color:var(--accent); }

  /* ===== Dependencies / time in detail ===== */
  .dep-picker { display:flex; flex-wrap:wrap; gap:6px; }
  .dep-opt { padding:5px 10px; border:1px solid var(--border); border-radius:14px; font-size:12.5px; cursor:pointer; }
  .dep-opt.sel { border-color:var(--accent); background:var(--accent-soft); }
  .dep-opt.is-done { color:var(--text-faint); text-decoration:line-through; }
  .blocked-tag { font-size:11px; color:var(--p1); margin-left:8px; }
  .meta-chip.blocked { color:var(--p1); font-weight:600; }
  .time-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .time-spent { font-weight:600; }
  .qa-inputrow { display:flex; align-items:center; gap:8px; }
  .qa-mic { width:40px; height:40px; min-width:40px; border-radius:11px; background:var(--hover); font-size:18px; }
  .qa-mic:hover { background:var(--accent-soft); }
  .qa-mic.listening { background:var(--p1); color:#fff; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,.5);} 50%{ box-shadow:0 0 0 8px rgba(239,68,68,0);} }

  /* ===== Day budget (planner) ===== */
  .budget { background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:14px; }
  .budget-top { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px; flex-wrap:wrap; }
  .budget-bar { height:9px; background:var(--hover); border-radius:6px; overflow:hidden; }
  .budget-fill { height:100%; background:var(--brand-grad); border-radius:6px; transition:width .4s; }
  .budget-fill.over { background:linear-gradient(135deg,var(--p2),var(--p1)); }
  .budget-warn { color:var(--p1); font-size:12px; margin-top:7px; }

  /* ===== Folders ===== */
  .folder-item { display:flex; align-items:center; gap:8px; padding:8px 10px 8px 6px; border-radius:11px; cursor:default; color:var(--text-dim); font-weight:600; font-size:13px; }
  .folder-item:hover { background:var(--hover); }
  .folder-item .label { flex:1; cursor:pointer; color:var(--text); }
  .folder-item .ico { font-size:14px; }
  .folder-item .icon-btn { width:26px; height:26px; }
  .folder-children { margin-left:14px; border-left:2px solid var(--border); padding-left:4px; }

  /* ===== Templates ===== */
  .tpl-row { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--border); }
  .tpl-info { flex:1; display:flex; flex-direction:column; }
  .tpl-meta { font-size:12px; color:var(--text-faint); }

  /* ===== Weekly Review ===== */
  .wr-title { font-size:19px; font-weight:800; margin-bottom:10px; }
  .wr-prog { height:6px; background:var(--hover); border-radius:4px; overflow:hidden; margin-bottom:16px; }
  .wr-prog div { height:100%; background:var(--brand-grad); transition:width .3s; }
  .wr-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .wr-acts { display:flex; gap:5px; flex-shrink:0; }
  .wr-acts button { padding:5px 10px; border-radius:8px; background:var(--hover); font-weight:600; font-size:12.5px; }
  .wr-acts button:hover { background:var(--accent-soft); }
  .wr-old { color:var(--text-faint); font-size:12px; }
  .wr-empty { color:var(--text-faint); padding:24px; text-align:center; }
  .wr-cele { text-align:center; padding:14px; }
  .wr-big { font-size:48px; font-weight:800; background:var(--brand-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .wr-winlist { margin-top:14px; display:flex; flex-direction:column; gap:4px; }
  .wr-win { color:var(--text-dim); font-size:13px; }

  /* ===== Status / type / mentions ===== */
  .status-chip { font-size:11px; padding:1px 8px; border:1px solid; border-radius:10px; display:inline-flex; align-items:center; gap:3px; }
  .mention { color:var(--accent); background:var(--accent-soft); padding:0 4px; border-radius:5px; font-weight:600; }

  /* ===== Timeline / Gantt ===== */
  .tl-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:12px; }
  .tl-head { display:flex; position:sticky; top:0; background:var(--bg-alt); border-bottom:1px solid var(--border); }
  .tl-day { flex-shrink:0; text-align:center; font-size:11px; color:var(--text-dim); padding:6px 0; border-right:1px solid var(--border); }
  .tl-day.tl-today { background:var(--accent-soft); color:var(--accent); font-weight:700; }
  .tl-row { display:flex; border-bottom:1px solid var(--border); min-height:38px; align-items:center; }
  .tl-label { width:180px; min-width:180px; padding:0 12px; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-right:1px solid var(--border); position:sticky; left:0; background:var(--bg); }
  .tl-track { position:relative; height:38px; flex-shrink:0; }
  .tl-bar { position:absolute; top:7px; height:24px; border-radius:7px; color:#fff; font-size:11px; line-height:24px; padding:0 8px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; cursor:pointer; box-shadow:var(--shadow-sm); }
  .tl-bar:hover { filter:brightness(1.08); }

  /* ===== Reports ===== */
  .rep-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .rep-row:last-child { border-bottom:none; }

  /* ===== Goals ===== */
  .goal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  .goal-card { border:1px solid var(--border); border-radius:14px; padding:16px; background:var(--bg-alt); }
  .goal-head { display:flex; align-items:center; justify-content:space-between; }
  .goal-scope { font-size:12px; color:var(--text-dim); margin-bottom:10px; }
  .goal-bar { height:10px; background:var(--hover); border-radius:6px; overflow:hidden; }

    box-shadow:var(--shadow-sm); transition:border-color .12s, transform .1s; }
  .sb-account:hover { border-color:var(--accent); transform:translateY(-1px); }

<div id="app">
  <div id="scrim"></div>
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>
<nav id="bottomnav"></nav>
<div id="modal-root"></div>

<script>
"use strict";
/* ============================================================
   TaskFlow — a Todoist + Asana hybrid. Single-file, local-first.
   Data persists in localStorage. Import via JSON (see Import view).
   ============================================================ */

// ---------- Utilities ----------
const $ = (sel, el=document) => el.querySelector(sel);
const uid = (p='id') => p + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clone = (o) => JSON.parse(JSON.stringify(o));

const PROJECT_COLORS = ['#dc4c3e','#eb8909','#f9d71c','#7ecc49','#299438','#6accbc','#158fad','#14aaf5','#96c3eb','#4073ff','#884dff','#af38eb','#eb96eb','#e05194','#ff8d85','#808080','#b8b8b8','#ccac93'];
const LABEL_COLORS = PROJECT_COLORS;

// ---------- Date helpers ----------
function todayStr() { const d = new Date(); return ymd(d); }
function ymd(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function parseYmd(s) { if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(s, n) { const d = parseYmd(s); d.setDate(d.getDate()+n); return ymd(d); }
function addMonths(s, n) { const d = parseYmd(s); const day = d.getDate(); d.setDate(1); d.setMonth(d.getMonth()+n); const last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); d.setDate(Math.min(day, last)); return ymd(d); }
function dayDiff(a, b) { return Math.round((parseYmd(a) - parseYmd(b)) / 86400000); }
function weekdayName(s){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][parseYmd(s).getDay()]; }
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s) {
  if (!s) return '';
  const diff = dayDiff(s, todayStr());
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  const d = parseYmd(s);
  const base = MONTHS[d.getMonth()] + ' ' + d.getDate();
  if (diff > 1 && diff < 7) return weekdayName(s);
  if (d.getFullYear() !== new Date().getFullYear()) return base + ' ' + d.getFullYear();
  return base;
}
function fmtTime(t) {
  if (!t) return '';
  let [h,m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'PM':'AM'; h = h%12 || 12;
  return h + (m? ':'+String(m).padStart(2,'0') : '') + ap;
}

// ---------- Natural language quick-add parser ----------
const WEEKDAYS = {sun:0,sunday:0,mon:1,monday:1,tue:2,tues:2,tuesday:2,wed:3,weds:3,wednesday:3,thu:4,thur:4,thurs:4,thursday:4,fri:5,friday:5,sat:6,saturday:6};
function nextWeekday(target, fromToday=true) {
  const d = new Date(); let cur = d.getDay();
  let delta = (target - cur + 7) % 7;
  if (delta === 0) delta = 7; // next occurrence
  d.setDate(d.getDate()+delta); return ymd(d);
}
// Returns {title, date, time, priority, recurrence, labelNames[]}
function parseQuickAdd(raw) {
  let text = ' ' + raw + ' ';
  const res = { title:'', date:null, time:null, priority:4, recurrence:null, labelNames:[], estimate:null };

  // labels @label
  text = text.replace(/\s@([\w-]+)/g, (m,l)=>{ res.labelNames.push(l); return ' '; });

  // estimate: ~30m, ~1h, ~1h30m, est 45m
  text = text.replace(/\s(?:~|est\s+)(\d+)\s*h(?:\s*(\d+)\s*m)?\b/i, (m,h,mm)=>{ res.estimate = (+h)*60 + (mm?+mm:0); return ' '; });
  text = text.replace(/\s(?:~|est\s+)(\d+)\s*m(?:in)?\b/i, (m,mm)=>{ if(res.estimate==null) res.estimate = +mm; return ' '; });

  // priority p1..p4 or !!1
  text = text.replace(/\s[!p]([1-4])\b/i, (m,n)=>{ res.priority = +n; return ' '; });

  // time: "at 5pm", "5:30pm", "at 17:00"
  text = text.replace(/\s(?:at\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i, (m,h,mm,ap)=>{
    h=+h; if(/pm/i.test(ap)&&h<12)h+=12; if(/am/i.test(ap)&&h===12)h=0;
    res.time = String(h).padStart(2,'0')+':'+(mm||'00'); return ' ';
  });
  text = text.replace(/\sat\s+(\d{1,2}):(\d{2})\b/, (m,h,mm)=>{ res.time = String(+h).padStart(2,'0')+':'+mm; return ' '; });

  // recurrence: "every day", "every week", "every monday", "every 2 weeks"
  text = text.replace(/\severy\s+(day|week|month|year|weekday|\d+\s+(?:days?|weeks?|months?)|mon\w*|tue\w*|wed\w*|thu\w*|fri\w*|sat\w*|sun\w*)\b/i, (m,what)=>{
    res.recurrence = ('every '+what).toLowerCase().trim();
    if (!res.date) { // set first occurrence
      const w = what.toLowerCase();
      if (WEEKDAYS[w] != null) res.date = nextWeekday(WEEKDAYS[w]); // exact weekday word only
      else res.date = todayStr(); // day/week/month/year/weekday/every N units
    }
    return ' ';
  });

  // explicit dates
  const dateRules = [
    [/\btoday\b/i, ()=>todayStr()],
    [/\btomorrow\b/i, ()=>addDays(todayStr(),1)],
    [/\byesterday\b/i, ()=>addDays(todayStr(),-1)],
    [/\bnext week\b/i, ()=>addDays(todayStr(),7)],
  ];
  for (const [re, fn] of dateRules) {
    if (re.test(text) && !res.date) { res.date = fn(); text = text.replace(re,' '); }
  }
  // "next monday" / "monday"
  text = text.replace(/\b(next\s+)?(sun|mon|tue|tues|wed|weds|thu|thur|thurs|fri|sat)\w*\b/i, (m, nx, wd)=>{
    if (res.date) return m;
    const key = wd.toLowerCase();
    const target = WEEKDAYS[key] != null ? WEEKDAYS[key] : WEEKDAYS[key.slice(0,3)];
    if (target==null) return m;
    res.date = nextWeekday(target); return ' ';
  });
  // ISO date in text e.g. 2026-06-10 or Jun 10
  text = text.replace(/\b(\d{4})-(\d{2})-(\d{2})\b/, (m,y,mo,d)=>{ if(!res.date) res.date = `${y}-${mo}-${d}`; return ' '; });
  text = text.replace(new RegExp('\\b('+MONTHS.join('|')+')\\w*\\s+(\\d{1,2})\\b','i'), (m,mon,d)=>{
    if(res.date) return m;
    const mi = MONTHS.findIndex(x=>x.toLowerCase()===mon.slice(0,3).toLowerCase());
    const yr = new Date().getFullYear();
    res.date = `${yr}-${String(mi+1).padStart(2,'0')}-${String(+d).padStart(2,'0')}`;
    if (dayDiff(res.date, todayStr()) < -1) res.date = `${yr+1}-${String(mi+1).padStart(2,'0')}-${String(+d).padStart(2,'0')}`;
    return ' ';
  });

  res.title = text.replace(/\s+/g,' ').trim();
  return res;
}

// ---------- Recurrence advance ----------
function advanceRecurrence(dateStr, rule) {
  if (!rule || !dateStr) return null;
  const r = rule.toLowerCase().replace(/^every\s+/,'').trim();
  let m;
  if (r === 'day' || r === 'daily') return addDays(dateStr, 1);
  if (r === 'week' || r === 'weekly') return addDays(dateStr, 7);
  if (r === 'weekday') { let d = addDays(dateStr,1); while([0,6].includes(parseYmd(d).getDay())) d=addDays(d,1); return d; }
  if (r === 'month' || r === 'monthly') return addMonths(dateStr, 1);
  if (r === 'year' || r === 'yearly') { const d=parseYmd(dateStr); d.setFullYear(d.getFullYear()+1); return ymd(d); }
  if (m = r.match(/^(\d+)\s+days?$/)) return addDays(dateStr, +m[1]);
  if (m = r.match(/^(\d+)\s+weeks?$/)) return addDays(dateStr, +m[1]*7);
  if (m = r.match(/^(\d+)\s+months?$/)) return addMonths(dateStr, +m[1]);
  const wd = Object.keys(WEEKDAYS).find(k=>r.startsWith(k.slice(0,3)) && k.length>2);
  if (wd != null) { let d=addDays(dateStr,1); while(parseYmd(d).getDay()!==WEEKDAYS[wd]) d=addDays(d,1); return d; }
  return addDays(dateStr, 1);
}

// ============================================================
//  STATE
// ============================================================
const STORE_KEY = 'taskflow.v1';
let state = migrate(load() || seed());
let ui = { view: 'today', projectId: null, labelName: null, filterId: null, search: '', sidebarCollapsed: false, collapsedSections: {}, drawerOpen: false, mSearch: false, selected: new Set(), calMonth: null, statRange: 14 };

function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function load() { try { const r = localStorage.getItem(STORE_KEY); return r? JSON.parse(r): null; } catch(e){ return null; } }

// Backfill fields added in later versions so old saves keep working.
function migrate(s) {
  if (!s) return null;
  s.settings = Object.assign({ theme:'light', userName:'Me', accent:'#6d5dfc', themePreset:'aurora', sound:true, notifications:false, autoCarry:false, dayStart:9, dayEnd:18, lastCarry:null }, s.settings||{});
  s.stats = Object.assign({ xp:0, level:1, streak:0, longestStreak:0, lastActiveDate:null, totalCompleted:0 }, s.stats||{});
  s.activity = s.activity || {};          // { 'YYYY-MM-DD': count }
  s.achievements = s.achievements || {};  // { achId: timestamp }
  s.filters = s.filters || [];
  s.templates = s.templates || [];        // [{id,name,color,view,sections:[],tasks:[]}]
  s.folders = s.folders || [];            // [{id,name,order,collapsed}]
  s.people = s.people || [];              // [{id,name,color}] for assignment/@mentions
  s.goals = s.goals || [];                // [{id,name,target,labelId?,projectId?,createdAt}]
  s.activityLog = s.activityLog || [];    // [{id,ts,type,taskId,text}] audit trail (capped)
  s.automations = s.automations || [];    // [{id,name,on,projectId?,keyword?,set:{}}]
  s.customFields = s.customFields || [];  // [{id,name,type,options?}]
  s.settings.workspaceName = s.settings.workspaceName || 'TaskFlow';
  if (s.settings.passcode===undefined) s.settings.passcode = null;
  if (s.settings.sortMode===undefined) s.settings.sortMode = 'smart';
  (s.tasks||[]).forEach(t=>{
    if (t.dependsOn===undefined) t.dependsOn = [];
    if (t.timeSpent===undefined) t.timeSpent = 0;   // seconds
    if (t.estimate===undefined) t.estimate = null;  // minutes
    if (t.status===undefined) t.status = t.completed?'done':'todo';   // todo|inprogress|inreview|blocked|done
    if (t.deadline===undefined) t.deadline = null;  // hard deadline YYYY-MM-DD
    if (t.milestone===undefined) t.milestone = false;
    if (t.type===undefined) t.type = 'task';        // task|bug|feature
    if (t.attachments===undefined) t.attachments = [];
    if (t.custom===undefined) t.custom = {};
  });
  (s.projects||[]).forEach(p=>{ if(p.folderId===undefined) p.folderId=null; });
  return s; // accent applied during init (after THEME_PRESETS is defined)
}

function seed() {
  const pInbox = { id:'inbox', name:'Inbox', color:'#808080', view:'list', order:0, archived:false, system:true };
  const pWork = { id: uid('proj'), name:'Work', color:'#14aaf5', view:'board', order:1, archived:false };
  const pPersonal = { id: uid('proj'), name:'Personal', color:'#7ecc49', view:'list', order:2, archived:false };
  const secTodo = { id: uid('sec'), projectId: pWork.id, name:'To Do', order:0 };
  const secDoing = { id: uid('sec'), projectId: pWork.id, name:'In Progress', order:1 };
  const secDone = { id: uid('sec'), projectId: pWork.id, name:'Done', order:2 };
  const lUrgent = { id: uid('lbl'), name:'urgent', color:'#dc4c3e' };
  const lHome = { id: uid('lbl'), name:'home', color:'#7ecc49' };
  const t = (o) => Object.assign({ id:uid('task'), projectId:'inbox', sectionId:null, parentId:null, title:'', description:'', priority:4, dueDate:null, dueTime:null, recurrence:null, labels:[], assignee:null, completed:false, completedAt:null, createdAt:Date.now(), order:0, dependsOn:[], timeSpent:0, estimate:null, status:'todo', deadline:null, milestone:false, type:'task', attachments:[], custom:{} }, o);
  const tasks = [
    t({ title:'Welcome to TaskFlow 👋 — click me to see details', description:'This is a full task detail view. You can edit everything here: description, priority, due date, labels, subtasks, and comments.', projectId:'inbox', priority:1, dueDate: todayStr(), order:0 }),
    t({ title:'Try the natural-language Quick Add', description:'Press "q" or click + Add task. Type: "Email Sam tomorrow at 9am p1 @urgent"', projectId:'inbox', priority:2, dueDate: todayStr(), order:1, labels:[lUrgent.id] }),
    t({ title:'Review imported items', projectId:pWork.id, sectionId:secTodo.id, priority:3, dueDate: addDays(todayStr(),1), order:0 }),
    t({ title:'Draft Q3 plan', projectId:pWork.id, sectionId:secDoing.id, priority:1, dueDate: todayStr(), order:0, labels:[lUrgent.id] }),
    t({ title:'Kick-off meeting notes', projectId:pWork.id, sectionId:secDone.id, completed:true, completedAt:Date.now(), order:0 }),
    t({ title:'Water the plants', projectId:pPersonal.id, recurrence:'every 3 days', dueDate: todayStr(), order:0, labels:[lHome.id] }),
    t({ title:'Buy groceries', projectId:pPersonal.id, dueDate: addDays(todayStr(),2), order:1, labels:[lHome.id] }),
  ];
  return {
    projects: [pInbox, pWork, pPersonal],
    sections: [secTodo, secDoing, secDone],
    labels: [lUrgent, lHome],
    tasks,
    comments: [],
    filters: [ { id: uid('flt'), name:'Priority 1', color:'#dc4c3e', query:'p1' }, { id: uid('flt'), name:'No date', color:'#808080', query:'no date' } ],
    settings: { theme: 'light', userName: 'Me', accent:'#6d5dfc', themePreset:'aurora', sound:true, notifications:false, autoCarry:false, dayStart:9, dayEnd:18, lastCarry:null },
    stats: { xp:0, level:1, streak:0, longestStreak:0, lastActiveDate:null, totalCompleted:0 },
    activity: {},
    achievements: {},
    templates: [],
    folders: [],
    people: [],
    goals: [],
    activityLog: [],
    automations: [],
    customFields: [],
  };
}

// ---------- Selectors ----------
const getProject = id => state.projects.find(p=>p.id===id);
const getLabel = id => state.labels.find(l=>l.id===id);
const projectTasks = pid => state.tasks.filter(t=>t.projectId===pid && !t.parentId);
const subtasks = pid => state.tasks.filter(t=>t.parentId===pid);
const taskComments = tid => state.comments.filter(c=>c.taskId===tid).sort((a,b)=>a.createdAt-b.createdAt);
const projectSections = pid => state.sections.filter(s=>s.projectId===pid).sort((a,b)=>a.order-b.order);
function activeProjects() { return state.projects.filter(p=>!p.system && !p.archived).sort((a,b)=>a.order-b.order); }
function labelTaskCount(name){ return state.tasks.filter(t=>!t.completed && t.labels.some(id=>{const l=getLabel(id); return l&&l.name===name;})).length; }

function counts() {
  const t = todayStr();
  return {
    inbox: state.tasks.filter(x=>x.projectId==='inbox' && !x.completed && !x.parentId).length,
    today: state.tasks.filter(x=>!x.completed && x.dueDate && dayDiff(x.dueDate,t)<=0).length,
    upcoming: state.tasks.filter(x=>!x.completed && x.dueDate && dayDiff(x.dueDate,t)>0).length,
  };
}

function priorityFlag(p){ return p<4 ? `<span class="flag-p${p}" title="Priority ${p}">⚑</span>` : ''; }

function taskMetaHtml(t) {
  const bits = [];
  if (t.dueDate) {
    const diff = dayDiff(t.dueDate, todayStr());
    let cls = 'due'; if (diff<0) cls='overdue'; else if (diff===0) cls='today';
    const time = t.dueTime ? ' ' + fmtTime(t.dueTime) : '';
    const rec = t.recurrence ? ' ⟳' : '';
    bits.push(`<span class="meta-chip ${cls}">📅 ${esc(fmtDate(t.dueDate))}${esc(time)}${rec}</span>`);
  } else if (t.recurrence) {
    bits.push(`<span class="meta-chip">⟳ ${esc(t.recurrence)}</span>`);
  }
  if (!t.completed && t.status && t.status!=='todo' && t.status!=='done') bits.push(statusChipHtml(t));
  if (t.deadline) { const od=dayDiff(t.deadline,todayStr())<0&&!t.completed; bits.push(`<span class="meta-chip ${od?'overdue':''}">⏰ ${esc(fmtDate(t.deadline))}</span>`); }
  if (!t.completed && isBlocked(t)) bits.push(`<span class="meta-chip blocked">🔒 Blocked</span>`);
  const subs = subtasks(t.id);
  if (subs.length) bits.push(`<span class="subcount">☑ ${subs.filter(s=>s.completed).length}/${subs.length}</span>`);
  if (t.estimate) bits.push(`<span class="meta-chip">~${esc(fmtEst(t.estimate))}</span>`);
  if (t.timeSpent) bits.push(`<span class="meta-chip">⏱ ${fmtDuration(t.timeSpent)}</span>`);
  const cc = taskComments(t.id).length;
  if (cc) bits.push(`<span class="meta-chip">💬 ${cc}</span>`);
  for (const lid of t.labels) { const l=getLabel(lid); if(l) bits.push(`<span class="label-chip" style="color:${l.color}">🏷 ${esc(l.name)}</span>`); }
  if (t.assignee) bits.push(`<span class="meta-chip">👤 ${esc(t.assignee)}</span>`);
  return bits.length ? `<div class="task-meta">${bits.join('')}</div>` : '';
}

function taskRowHtml(t, opts={}) {
  const p = t.priority||4;

      ${t.description?`<div class="task-desc">${esc(t.description).split('\n')[0].slice(0,160)}</div>`:''}
      ${taskMetaHtml(t)}
    </div>
    ${showProj?`<span class="proj-chip"><span class="proj-dot" style="background:${proj.color}"></span>${esc(proj.name)}</span>`:''}
    <div class="task-actions">

}

function groupedListHtml(tasks, opts={}) {
  if (!tasks.length) return emptyState(opts.emptyMsg || 'No tasks here.');
  let html = '';
  for (const t of tasks) {
    html += taskRowHtml(t, opts);
    const subs = subtasks(t.id).sort((a,b)=>a.order-b.order);
    for (const s of subs) html += taskRowHtml(s, {sub:true});
  }
  return html;
}

function emptyState(msg, emoji='🎉') {
  return `<div class="empty-state"><div class="big">${emoji}</div><div>${esc(msg)}</div></div>`;
}

function sortTasks(arr) {
  return arr.slice().sort((a,b)=>{
    if (!!a.completed !== !!b.completed) return a.completed?1:-1;
    if ((a.priority||4)!==(b.priority||4)) return (a.priority||4)-(b.priority||4);
    if (a.dueDate && b.dueDate && a.dueDate!==b.dueDate) return a.dueDate<b.dueDate?-1:1;
    if (!!a.dueDate !== !!b.dueDate) return a.dueDate?-1:1;
    return (a.order||0)-(b.order||0);
  });
}

// Compound natural-language query: clauses joined by '&' (AND) and '|' (OR within a clause).
// Tokens: p1..p4, overdue, today, tomorrow, this week, no date, has date, recurring,
//   blocked, completed/done, @label, project:Name / in:Name, due before X, due after X, plain text.
function matchesQuery(t, q) {
  q = (q||'').trim().toLowerCase();
  if (!q) return true;
  return q.split('&').every(part => part.split('|').some(c => clauseMatch(t, c.trim())));
}
function parseDatePhrase(s){ try { return parseQuickAdd(' '+s+' ').date; } catch(e){ return null; } }
function clauseMatch(t, c) {
  if (!c) return true;
  let m;
  if (c==='p1') return t.priority===1;
  if (c==='p2') return t.priority===2;
  if (c==='p3') return t.priority===3;
  if (c==='p4') return t.priority===4;
  if (c==='no date'||c==='no due date'||c==='nodate') return !t.dueDate;
  if (c==='has date'||c==='scheduled') return !!t.dueDate;
  if (c==='overdue') return t.dueDate && dayDiff(t.dueDate,todayStr())<0 && !t.completed;
  if (c==='today') return t.dueDate && dayDiff(t.dueDate,todayStr())===0;
  if (c==='tomorrow') return t.dueDate===addDays(todayStr(),1);
  if (c==='this week'||c==='week') return t.dueDate && dayDiff(t.dueDate,todayStr())>=0 && dayDiff(t.dueDate,todayStr())<7;
  if (c==='recurring') return !!t.recurrence;
  if (c==='blocked') return isBlocked(t) || t.status==='blocked';
  if (c==='milestone') return !!t.milestone;
  if (c==='bug') return t.type==='bug';
  if (c==='feature') return t.type==='feature';
  if (c==='in progress'||c==='inprogress') return t.status==='inprogress';
  if (c==='in review'||c==='inreview'||c==='review') return t.status==='inreview';
  if (c==='has deadline') return !!t.deadline;
  if (c==='completed'||c==='done') return !!t.completed;
  if (c==='has estimate'||c==='estimated') return !!t.estimate;
  if (c.startsWith('@')) return t.labels.some(id=>{const l=getLabel(id);return l&&l.name.toLowerCase()===c.slice(1);});
  if ((m=c.match(/^(?:project|in|#)[:\s]?\s*(.+)$/))) { const p=getProject(t.projectId); return p && p.name.toLowerCase().includes(m[1].trim()); }
  if ((m=c.match(/^due\s+before\s+(.+)$/))||(m=c.match(/^before\s+(.+)$/))) { const d=parseDatePhrase(m[1]); return d && t.dueDate && t.dueDate < d; }
  if ((m=c.match(/^due\s+after\s+(.+)$/))||(m=c.match(/^after\s+(.+)$/))) { const d=parseDatePhrase(m[1]); return d && t.dueDate && t.dueDate > d; }
  if ((m=c.match(/^due\s+(.+)$/))) { const d=parseDatePhrase(m[1]); return d && t.dueDate===d; }
  return (t.title+' '+t.description).toLowerCase().includes(c);
}
function fmtEst(min){ if(!min) return ''; const h=Math.floor(min/60), m=min%60; return (h?h+'h':'')+(m?(h?' ':'')+m+'m':'')||'0m'; }

function renderMain() {
  const m = $('#main');
  let body = '';
  const v = ui.view;
  const titleRow = (emoji, title, sub, actions='') =>
    `<div class="view-title-row"><div class="view-title"><span class="emoji">${emoji}</span>${esc(title)}</div><div class="view-actions">${actions}</div></div>${sub?`<div class="view-sub">${sub}</div>`:''}`;

  if (ui.search) {
    const matched = state.tasks.filter(t=>!t.parentId && matchesQuery(t, ui.search));
    body = `<div class="view-inner">${titleRow('🔍','Search results', esc(matched.length+' for “'+ui.search+'”'))}${groupedListHtml(sortTasks(matched), {showProject:true, emptyMsg:'No matches.'})}</div>`;
    m.innerHTML = topbarHtml() + `<div class="view-scroll">${body}</div>`;
    wireMain(); return;
  }

  if (v==='today') {
    const t = todayStr();
    const overdue = sortTasks(state.tasks.filter(x=>!x.parentId&&!x.completed&&x.dueDate&&dayDiff(x.dueDate,t)<0));
    const today = sortTasks(state.tasks.filter(x=>!x.parentId&&!x.completed&&x.dueDate&&dayDiff(x.dueDate,t)===0));
    let inner = titleRow('📅','Today', esc((overdue.length+today.length)+' tasks'));
    if (overdue.length) inner += `<div class="task-group-head" style="color:var(--p1)">Overdue <span class="gcount">${overdue.length}</span></div>` + groupedListHtml(overdue);
    inner += `<div class="task-group-head">${MONTHS[parseYmd(t).getMonth()]} ${parseYmd(t).getDate()} · Today <span class="gcount">${today.length}</span></div>` + (today.length?groupedListHtml(today):'');
    inner += inlineAddHtml('inbox', null, t);
    if (!overdue.length && !today.length) inner += emptyState('All clear for today. Enjoy!','✨');
    body = `<div class="view-inner">${inner}</div>`;
  }
  else if (v==='upcoming') {
    const t = todayStr();
    let inner = titleRow('🗓','Upcoming','');
    const upTasks = state.tasks.filter(x=>!x.parentId&&!x.completed&&x.dueDate&&dayDiff(x.dueDate,t)>0);
    const byDate = {};
    upTasks.forEach(x=>{ (byDate[x.dueDate]=byDate[x.dueDate]||[]).push(x); });
    const dates = Object.keys(byDate).sort();
    if (!dates.length) inner += emptyState('Nothing scheduled ahead.','🌤');
    for (const d of dates.slice(0,60)) {
      inner += `<div class="task-group-head">${esc(fmtDate(d))} · ${weekdayName(d)} <span class="gcount">${byDate[d].length}</span></div>` + groupedListHtml(sortTasks(byDate[d]), {showProject:true});

  }
  else if (v==='inbox') {
    const tasks = sortTasks(projectTasks('inbox').filter(t=>!t.completed));
    let inner = titleRow('📥','Inbox', esc(tasks.length+' tasks'));
    inner += groupedListHtml(tasks, {draggable:true, emptyMsg:'Inbox zero ✨'});

    body = `<div class="view-inner">${inner}</div>`;

    for (const p of [getProject('inbox'), ...activeProjects()]) {
      const tasks = sortTasks(projectTasks(p.id).filter(t=>!t.completed));

      inner += `<div class="task-group-head"><span class="proj-dot" style="background:${p.color}"></span>${esc(p.name)} <span class="gcount">${tasks.length}</span></div>` + groupedListHtml(tasks);
    }
    body = `<div class="view-inner">${inner}</div>`;
  }
  else if (v==='completed') {
    const tasks = state.tasks.filter(t=>t.completed && !t.parentId).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
    let inner = titleRow('✅','Completed', esc(tasks.length+' done'));

    const f = state.filters.find(x=>x.id===ui.filterId);
    const tasks = sortTasks(state.tasks.filter(t=>!t.parentId && !t.completed && matchesQuery(t, f?f.query:'')));

  }
  else if (v==='project') {
    const p = getProject(ui.projectId);
    if (!p) { ui.view='today'; return render(); }
    const isBoard = p.view==='board';
    const actions = `<div class="seg"><button class="${!isBoard?'active':''}" data-projview="list">List</button><button class="${isBoard?'active':''}" data-projview="board">Board</button></div>
      <button class="icon-btn" data-act="project-menu-btn" data-id="${p.id}" title="Project menu" style="margin-left:6px">⋯</button>`;
    if (isBoard) {
      m.innerHTML = topbarHtml() + `<div class="view-scroll"><div class="board-inner"><div class="view-title-row"><div class="view-title"><span class="proj-dot" style="background:${p.color};width:14px;height:14px;display:inline-block;margin-right:8px"></span>${esc(p.name)}</div><div class="view-actions">${actions}</div></div>${boardHtml(p)}</div></div>`;
      wireMain(); return;
    } else {
      let inner = `<div class="view-title-row"><div class="view-title"><span class="proj-dot" style="background:${p.color};width:14px;height:14px;display:inline-block;margin-right:8px"></span>${esc(p.name)}</div><div class="view-actions">${actions}</div></div>`;
      const secs = projectSections(p.id);
      const noSec = sortTasks(projectTasks(p.id).filter(t=>!t.sectionId && !t.completed));
      inner += groupedListHtml(noSec, {draggable:true, emptyMsg:''}) + inlineAddHtml(p.id, null, null);
      for (const s of secs) {
        const tasks = sortTasks(projectTasks(p.id).filter(t=>t.sectionId===s.id && !t.completed));
        inner += `<div class="task-group-head" data-section="${s.id}"><span class="caret" data-seccaret="${s.id}">▾</span>${esc(s.name)} <span class="gcount">${tasks.length}</span><span style="flex:1"></span><button class="icon-btn" data-secmenu="${s.id}">⋯</button></div>`;
        inner += groupedListHtml(tasks, {draggable:true}) + inlineAddHtml(p.id, s.id, null);
      }
      inner += `<div class="inline-add"><div class="inline-add-trigger" data-act="add-section" data-proj="${p.id}"><span class="plus">+</span> Add section</div></div>`;
      body = `<div class="view-inner">${inner}</div>`;
    }
  }
  else if (v==='calendar') { body = `<div class="view-inner" style="max-width:1000px">${calendarViewHtml()}</div>`; }
  else if (v==='matrix')   { body = `<div class="view-inner" style="max-width:1100px">${matrixViewHtml()}</div>`; }
  else if (v==='planner')  { body = `<div class="view-inner" style="max-width:760px">${plannerViewHtml()}</div>`; }
  else if (v==='stats')    { body = `<div class="view-inner" style="max-width:900px">${statsViewHtml()}</div>`; }
  else if (v==='achievements') { body = `<div class="view-inner">${achievementsViewHtml()}</div>`; }
  else if (v==='timeline')  { body = `<div class="view-inner" style="max-width:1100px">${timelineViewHtml()}</div>`; }
  else if (v==='reports')   { body = `<div class="view-inner" style="max-width:900px">${reportsViewHtml()}</div>`; }
  else if (v==='goals')     { body = `<div class="view-inner">${goalsViewHtml()}</div>`; }
  else if (v==='activity')  { body = `<div class="view-inner">${activityViewHtml()}</div>`; }
  else if (v==='backlog')   {
    const tasks = sortTasks(state.tasks.filter(t=>!t.parentId && !t.completed && !t.dueDate));
    body = `<div class="view-inner">${`<div class="view-title-row"><div class="view-title"><span class="emoji">🗃️</span>Backlog</div></div><div class="view-sub">Unscheduled tasks — your queue of things with no date.</div>`}${groupedListHtml(tasks,{showProject:true,emptyMsg:'Backlog is clear.'})}</div>`;
  }
  else if (v==='import') {
    body = `<div class="view-inner">${importViewHtml()}</div>`;
  }

  m.innerHTML = topbarHtml() + `<div class="view-scroll">${body}</div>` + bulkBarHtml();
  wireMain();
}

// ---------- Board ----------
function boardHtml(p) {
  let secs = projectSections(p.id);
  if (!secs.length) {
    // auto-create a default section so board has a column
    const s = { id: uid('sec'), projectId:p.id, name:'To Do', order:0 };
    state.sections.push(s); persist(); secs=[s];
  }
  const noSec = sortTasks(projectTasks(p.id).filter(t=>!t.sectionId));
  let cols = '';
  // tasks without a section go into a leading "Unsorted" pseudo column only if any exist
  if (noSec.length) {
    cols += boardColHtml({id:'', name:'(No section)'}, noSec, p);
  }
  for (const s of secs) {
    const tasks = sortTasks(projectTasks(p.id).filter(t=>t.sectionId===s.id));
    cols += boardColHtml(s, tasks, p);
  }
  cols += `<div class="add-col" data-act="add-section" data-proj="${p.id}">+ Add section</div>`;
  return `<div class="board">${cols}</div>`;
}
function boardColHtml(sec, tasks, p) {
  const cards = tasks.map(t=>boardCardHtml(t)).join('');
  return `<div class="board-col" data-col="${sec.id}" data-proj="${p.id}">
    <div class="board-col-head"><span>${esc(sec.name)}</span><span class="gcount">${tasks.length}</span><span class="spacer"></span>${sec.id?`<button class="icon-btn" data-secmenu="${sec.id}">⋯</button>`:''}</div>
    <div class="board-cards" data-dropcol="${sec.id}">${cards}</div>
    <div class="board-add" data-inlineadd data-proj="${p.id}" data-sec="${sec.id}">+ Add task</div>
  </div>`;
}
function boardCardHtml(t) {
  const p = t.priority||4;
  return `<div class="board-card ${t.completed?'completed':''}" data-task="${t.id}" data-card="${t.id}" draggable="true">
    <div class="bc-top">
      <div class="checkbox ${p<4?'p'+p:''} ${t.completed?'done':''}" data-check="${t.id}">✓</div>
      <div class="task-body"><div class="task-title">${esc(t.title)}</div>${t.description?`<div class="task-desc">${esc(t.description.split('\n')[0].slice(0,120))}</div>`:''}${taskMetaHtml(t)}</div>
    </div>
  </div>`;
}

function exportData() { return { version:1, exportedAt: new Date().toISOString(), projects: state.projects, sections: state.sections, labels: state.labels, tasks: state.tasks, comments: state.comments, filters: state.filters }; }

function runImport(jsonText, replace) {
  let data;
  try { data = JSON.parse(jsonText); }
  catch(e) { return { ok:false, msg:'Invalid JSON: ' + e.message }; }

  // Full export format restore
  if (data.tasks && data.projects && data.sections && data.version) {
    if (replace) {
      state = { projects:data.projects, sections:data.sections||[], labels:data.labels||[], tasks:data.tasks, comments:data.comments||[], filters:data.filters||state.filters, settings: state.settings };
      persist();
      return { ok:true, msg:`Restored ${data.tasks.length} tasks, ${data.projects.length} projects.` };
    }
  }
  if (replace) {
    state = { projects:[{id:'inbox',name:'Inbox',color:'#808080',view:'list',order:0,archived:false,system:true}], sections:[], labels:[], tasks:[], comments:[], filters: state.filters, settings: state.settings };
  }

  const stats = { tasks:0, projects:0, labels:0, sections:0, subtasks:0, comments:0 };
  const labelByName = {};
  state.labels.forEach(l=>labelByName[l.name.toLowerCase()]=l);
  const ensureLabel = (name, color) => {
    const k = String(name).toLowerCase();
    if (labelByName[k]) return labelByName[k];
    const l = { id: uid('lbl'), name:String(name), color: color || LABEL_COLORS[state.labels.length % LABEL_COLORS.length] };
    state.labels.push(l); labelByName[k]=l; stats.labels++; return l;
  };
  (data.labels||[]).forEach(l => ensureLabel(l.name, l.color));

  const projByName = {};
  state.projects.forEach(p=>projByName[p.name.toLowerCase()]=p);
  const ensureProject = (name, color, view) => {
    if (!name) return getProject('inbox');
    const k = String(name).toLowerCase();
    if (projByName[k]) return projByName[k];
    const p = { id: uid('proj'), name:String(name), color: color || PROJECT_COLORS[state.projects.length % PROJECT_COLORS.length], view: view==='board'?'board':'list', order: state.projects.length, archived:false };
    state.projects.push(p); projByName[k]=p; stats.projects++; return p;
  };
  const sectionByKey = {};
  state.sections.forEach(s=>sectionByKey[s.projectId+'::'+s.name.toLowerCase()]=s);
  const ensureSection = (proj, name) => {
    if (!name) return null;
    const k = proj.id+'::'+String(name).toLowerCase();
    if (sectionByKey[k]) return sectionByKey[k];
    const s = { id: uid('sec'), projectId:proj.id, name:String(name), order: projectSections(proj.id).length };
    state.sections.push(s); sectionByKey[k]=s; stats.sections++; return s;
  };

  (data.projects||[]).forEach(p => {
    const proj = ensureProject(p.name, p.color, p.view);
    (p.sections||[]).forEach(sn => ensureSection(proj, sn));
  });

  const addTask = (raw, parentId=null) => {
    const proj = parentId ? null : ensureProject(raw.project, null, null);
    const sec = (proj && raw.section) ? ensureSection(proj, raw.section) : null;
    const labelIds = (raw.labels||[]).map(n => ensureLabel(n).id);
    const t = {
      id: uid('task'),
      projectId: parentId ? (state.tasks.find(x=>x.id===parentId)||{}).projectId || 'inbox' : (proj?proj.id:'inbox'),
      sectionId: sec?sec.id:null,
      parentId,
      title: String(raw.title||'Untitled'),
      description: raw.description||'',
      priority: [1,2,3,4].includes(raw.priority)?raw.priority:4,
      dueDate: raw.dueDate||null,
      dueTime: raw.dueTime||null,
      recurrence: raw.recurrence||null,
      labels: labelIds,
      assignee: raw.assignee||null,
      completed: !!raw.completed,
      completedAt: raw.completed?Date.now():null,
      createdAt: Date.now(),
      dependsOn: [], timeSpent: 0, estimate: (typeof raw.estimate==='number'?raw.estimate:null),
      status: raw.completed?'done':(raw.status||'todo'), deadline: raw.deadline||null, milestone: !!raw.milestone, type: raw.type||'task', attachments: [], custom: raw.custom||{},
      order: state.tasks.filter(x=>x.projectId===(proj?proj.id:'inbox')&&!x.parentId).length,
    };
    state.tasks.push(t);
    if (parentId) stats.subtasks++; else stats.tasks++;
    (raw.subtasks||[]).forEach(st => addTask(st, t.id));
    (raw.comments||[]).forEach(c => { state.comments.push({ id:uid('cm'), taskId:t.id, text:String(c.text||c), author:c.author||state.settings.userName, createdAt:Date.now() }); stats.comments++; });
    return t;
  };
  (data.tasks||[]).forEach(t => addTask(t));

  persist();
  const parts = [];
  if (stats.tasks) parts.push(stats.tasks+' tasks');
  if (stats.subtasks) parts.push(stats.subtasks+' subtasks');
  if (stats.projects) parts.push(stats.projects+' projects');
  if (stats.sections) parts.push(stats.sections+' sections');
  if (stats.labels) parts.push(stats.labels+' labels');
  if (stats.comments) parts.push(stats.comments+' comments');
  return { ok:true, msg: parts.length? 'Imported '+parts.join(', ')+'.' : 'Nothing to import — check your JSON has a "tasks" array.' };
}
