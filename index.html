function toggleComplete(id) {
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  // Dependency guard: don't allow completing a blocked task.
  if (!t.completed && isBlocked(t)) {
    toast('Blocked — finish its dependencies first'); return;
  }
  if (!t.completed && t.recurrence && t.dueDate) {
    const next = advanceRecurrence(t.dueDate, t.recurrence);
    t.dueDate = next; // recurring tasks roll forward instead of completing
    onCompletion(t);  // a recurring tick still counts toward karma/streaks
    toast('🔁 Rescheduled to '+fmtDate(next)+'  ·  +'+xpFor(t)+' XP');
  } else {
    t.completed = !t.completed;
    t.completedAt = t.completed?Date.now():null;
    if (t.completed) {
      t.status='done';
      subtasks(t.id).forEach(s=>{ if(!s.completed){s.completed=true;s.completedAt=Date.now();} });
      onCompletion(t);
      logActivity('completed', t.id, t.title);
      announceUnblocked(t.id);
      playSound('complete');
      toast('✓ Completed  ·  +'+xpFor(t)+' XP', 'Undo', ()=>{ t.completed=false; t.completedAt=null; undoCompletion(t); persist(); render(); });
    }
  }
  persist(); render();
  maybeCelebrateDay();
}

// ---------- Gamification engine ----------
function xpFor(t){ return 10 + (4-(t.priority||4))*5; }   // P1=25, P2=20, P3=15, P4=10
function levelForXp(xp){ return Math.floor(Math.sqrt(xp/50)) + 1; }   // 50,200,450,800… xp per level
function xpForLevel(lvl){ return 50*Math.pow(lvl-1,2); }
function onCompletion(t) {
  const s = state.stats; const today = todayStr();
  s.xp += xpFor(t); s.totalCompleted += 1;
  const newLevel = levelForXp(s.xp);
  if (newLevel > s.level) { s.level = newLevel; setTimeout(()=>{ toast('🎉 Level up! You reached level '+newLevel); confettiBurst(); }, 250); }
  // streak
  if (s.lastActiveDate !== today) {
    s.streak = (s.lastActiveDate === addDays(today,-1)) ? s.streak+1 : 1;
    s.lastActiveDate = today;
    s.longestStreak = Math.max(s.longestStreak||0, s.streak);
  }
  // activity heatmap
  state.activity[today] = (state.activity[today]||0) + 1;
  checkAchievements();
}
function undoCompletion(t) {
  const s = state.stats; const today = todayStr();
  s.xp = Math.max(0, s.xp - xpFor(t)); s.totalCompleted = Math.max(0, s.totalCompleted-1);
  s.level = levelForXp(s.xp);
  if (state.activity[today]) { state.activity[today]--; if(state.activity[today]<=0) delete state.activity[today]; }
}
function isBlocked(t){ return (t.dependsOn||[]).some(id=>{ const d=state.tasks.find(x=>x.id===id); return d && !d.completed; }); }
function announceUnblocked(completedId) {
  const newlyFree = state.tasks.filter(t=>!t.completed && (t.dependsOn||[]).includes(completedId) && !isBlocked(t));
  if (newlyFree.length) setTimeout(()=>toast('🔓 Unblocked: '+newlyFree.map(t=>t.title).join(', ').slice(0,60)), 400);
}
function maybeCelebrateDay() {
  const today = todayStr();
  const due = state.tasks.filter(x=>!x.parentId && x.dueDate && dayDiff(x.dueDate,today)<=0);
  const open = due.filter(x=>!x.completed);
  if (due.length>=1 && open.length===0 && !ui._celebratedDay) {
    ui._celebratedDay = today;
    confettiBurst(); playSound('fanfare');
    toast('🌟 All done for today — inbox zero on your schedule!');
  }
  if (open.length>0) ui._celebratedDay = null;
}

function checkAchievements() {

  }
  if (unlocked.length) {
    unlocked.forEach((a,i)=>setTimeout(()=>{ toast('🏅 Achievement unlocked: '+a.icon+' '+a.name); confettiBurst(); }, 300+i*900));
  }
}

// ---------- Confetti (canvas, no deps) ----------
function confettiBurst() {
  let cv = document.getElementById('confetti-cv');
  if (!cv) { cv=document.createElement('canvas'); cv.id='confetti-cv'; cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:500'; document.body.appendChild(cv); }
  cv.width=innerWidth; cv.height=innerHeight; const ctx=cv.getContext('2d');
  const colors=['#6d5dfc','#9163ff','#34d399','#f59e0b','#ef4444','#3b82f6','#eb96eb'];
  const N=140, parts=[];
  for(let i=0;i<N;i++) parts.push({ x:innerWidth/2+(Math.random()-.5)*120, y:innerHeight/2+(Math.random()-.5)*40, vx:(Math.random()-.5)*14, vy:Math.random()*-15-4, g:.4+Math.random()*.3, r:4+Math.random()*6, c:colors[i%colors.length], rot:Math.random()*6, vr:(Math.random()-.5)*.4, life:0 });
  let frames=0;
  (function anim(){
    ctx.clearRect(0,0,cv.width,cv.height); frames++;
    parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); ctx.restore(); });
    if (frames<140) requestAnimationFrame(anim); else { ctx.clearRect(0,0,cv.width,cv.height); }
  })();
}

// ---------- Sound FX (WebAudio, no assets) ----------
let _audioCtx=null;
function playSound(kind) {
  if (!state.settings.sound) return;
  try {
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ac=_audioCtx, now=ac.currentTime;
    const notes = kind==='fanfare' ? [523,659,784,1047] : kind==='complete' ? [660,880] : [440];
    notes.forEach((f,i)=>{ const o=ac.createOscillator(), g=ac.createGain(); o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(ac.destination); const t0=now+i*0.08; g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.18,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22); o.start(t0); o.stop(t0+0.24); });
  } catch(e){}
}

// ---------- Accent / theme presets ----------
const THEME_PRESETS = {
  aurora:  { accent:'#6d5dfc', accent2:'#9163ff' },
  ocean:   { accent:'#0ea5b7', accent2:'#22c1c3' },
  sunset:  { accent:'#f0653e', accent2:'#ff9472' },
  forest:  { accent:'#2f9e44', accent2:'#69db7c' },
  rose:    { accent:'#e64980', accent2:'#ff8fab' },
  mono:    { accent:'#475569', accent2:'#94a3b8' },
};
function applyAccent(accent, preset) {
  const p = THEME_PRESETS[preset];
  const a = accent || (p&&p.accent) || '#6d5dfc';
  const a2 = (p&&p.accent2) || lighten(a, 22);
  const root = document.documentElement.style;
  root.setProperty('--accent', a);
  root.setProperty('--accent-2', a2);
  root.setProperty('--brand-grad', `linear-gradient(135deg, ${a} 0%, ${a2} 100%)`);
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.content=a;
}
function lighten(hex, amt){ try{ let n=parseInt(hex.slice(1),16); let r=Math.min(255,(n>>16)+amt), g=Math.min(255,((n>>8)&255)+amt), b=Math.min(255,(n&255)+amt); return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0'); }catch(e){return hex;} }
function deleteTask(id) {
  const tk = state.tasks.find(t=>t.id===id);
  if (tk) logActivity('deleted', '', tk.title);
  const subs = subtasks(id).map(s=>s.id);
  state.tasks = state.tasks.filter(t=>t.id!==id && !subs.includes(t.id));
  state.comments = state.comments.filter(c=>c.taskId!==id);
  persist(); render(); toast('Task deleted');
}
// Complete a task permanently: marks done AND ends any recurrence so it never rolls forward again.
function completeForever(id) {
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  if (isBlocked(t)) { toast('Blocked — finish its dependencies first'); return; }
  const prevRec = t.recurrence || null;     // remember for undo
  const wasComplete = t.completed;
  t.recurrence = null;
  if (!t.completed) {
    t.completed = true; t.completedAt = Date.now();
    subtasks(t.id).forEach(s=>{ if(!s.completed){s.completed=true;s.completedAt=Date.now();} });
    onCompletion(t); announceUnblocked(t.id); playSound('complete');
  }
  persist();
  if (modalRoot.innerHTML) closeModal();
  render(); maybeCelebrateDay();
  toast(prevRec ? '✓✓ Completed forever — recurrence ended' : '✓✓ Completed forever', 'Undo', ()=>{
    t.recurrence = prevRec;
    if (!wasComplete) { t.completed=false; t.completedAt=null; undoCompletion(t); }
    persist(); render();
  });
}
function addTaskFromParse(parsed, projId, sectionId, parentId=null) {
  const labelIds = parsed.labelNames.map(n=>{
    let l = state.labels.find(x=>x.name.toLowerCase()===n.toLowerCase());
    if (!l){ l={id:uid('lbl'),name:n,color:LABEL_COLORS[state.labels.length%LABEL_COLORS.length]}; state.labels.push(l); }
    return l.id;
  });
  const t = { id:uid('task'), projectId: projId||'inbox', sectionId: sectionId||null, parentId, title:parsed.title||'Untitled', description:'', priority:parsed.priority||4, dueDate:parsed.date||null, dueTime:parsed.time||null, recurrence:parsed.recurrence||null, labels:labelIds, assignee:null, completed:false, completedAt:null, createdAt:Date.now(), order: state.tasks.length, dependsOn:[], timeSpent:0, estimate:parsed.estimate||null, status:'todo', deadline:null, milestone:false, type:'task', attachments:[], custom:{} };
  applyAutomations(t);
  state.tasks.push(t); logActivity('created', t.id, t.title); persist(); return t;
}

// ---------- Voice input (Web Speech API) ----------
function wireVoice(btn, input, after) {
  if (!btn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { btn.style.display='none'; return; }
  let rec=null, listening=false;
  btn.onclick=()=>{
    if (listening){ rec && rec.stop(); return; }
    rec = new SR(); rec.lang='en-US'; rec.interimResults=true; rec.continuous=false;
    let base = input.value ? input.value+' ' : '';
    rec.onstart=()=>{ listening=true; btn.classList.add('listening'); };
    rec.onend=()=>{ listening=false; btn.classList.remove('listening'); after&&after(); };
    rec.onerror=()=>{ listening=false; btn.classList.remove('listening'); };
    rec.onresult=(e)=>{ let txt=''; for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript; input.value=base+txt; after&&after(); };
    rec.start();
  };
}

// ---------- context menus ----------
let openMenu = null;
function showMenu(x,y,items) {
  closeMenuEl();
  const el = document.createElement('div'); el.className='menu';
  el.innerHTML = items.map(i=> i==='sep'?'<div class="sep"></div>':`<button class="${i.danger?'danger':''}" data-mi>${i.icon?i.icon+' ':''}${esc(i.label)}</button>`).join('');
  document.body.appendChild(el);
  const btns = [...el.querySelectorAll('[data-mi]')]; let bi=0;
  items.forEach(i=>{ if(i!=='sep'){ btns[bi].onclick=()=>{ closeMenuEl(); i.fn(); }; bi++; } });
  const rect = el.getBoundingClientRect();
  el.style.left = Math.min(x, innerWidth-rect.width-8)+'px';
  el.style.top = Math.min(y, innerHeight-rect.height-8)+'px';
  openMenu = el;
}
function closeMenuEl(){ if(openMenu){ openMenu.remove(); openMenu=null; } }
document.addEventListener('mousedown', e=>{ if(openMenu && !openMenu.contains(e.target)) closeMenuEl(); });

function deleteProject(id) {
  const taskIds = state.tasks.filter(t=>t.projectId===id).map(t=>t.id);

  state.sections = state.sections.filter(s=>s.projectId!==id);
  state.projects = state.projects.filter(p=>p.id!==id);
  if (ui.projectId===id){ ui.view='today'; ui.projectId=null; }

function doRunImport() {
  const txt = $('#import-json').value.trim();
  const replace = $('#import-replace').checked;
  if (!txt) { $('#import-result').innerHTML = `<span style="color:var(--p1)">Paste some JSON first.</span>`; return; }
  const res = runImport(txt, replace);
  $('#import-result').innerHTML = res.ok
    ? `<span style="color:var(--green)">✓ ${esc(res.msg)}</span> <button class="btn ghost" data-act-goto="today">View tasks →</button>`
    : `<span style="color:var(--p1)">✕ ${esc(res.msg)}</span>`;
  const goto = $('#import-result').querySelector('[data-act-goto]');
  if (goto) goto.onclick=()=>{ ui.view='today'; render(); };
  if (res.ok) { renderSidebar(); wireSidebar(); }
}
function copyText(text) {
  const done = ()=>toast('Copied to clipboard');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); done(); }
  catch(e){ toast('Press Ctrl+C to copy'); }
  document.body.removeChild(ta);
}
function downloadExport() {
  const blob = new Blob([$('#export-json').value], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='taskflow-export.json'; a.click();
}

// ---------- Drag & drop (list reorder + board move) ----------
let dragId = null;
function wireDragDrop(m) {
  m.querySelectorAll('[draggable="true"]').forEach(el=>{
    el.addEventListener('dragstart', e=>{ dragId=el.dataset.task; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); dragId=null; });
  });
  // board columns
  m.querySelectorAll('[data-dropcol]').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.parentElement.classList.add('drag-over'); });
    col.addEventListener('dragleave', ()=>col.parentElement.classList.remove('drag-over'));
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.parentElement.classList.remove('drag-over');
      if(!dragId) return; const t=state.tasks.find(x=>x.id===dragId); if(!t) return;
      const secId = col.dataset.dropcol || null;
      t.sectionId = secId || null;
      // place at end
      const peers = state.tasks.filter(x=>x.projectId===t.projectId && x.sectionId===t.sectionId);
      t.order = peers.length;
      persist(); render();
    });
  });
  // list reorder: drop onto a task row reorders within same list
  m.querySelectorAll('.task-row[draggable="true"]').forEach(row=>{
    row.addEventListener('dragover', e=>{ e.preventDefault(); });
    row.addEventListener('drop', e=>{
      e.preventDefault(); e.stopPropagation();
      if(!dragId || dragId===row.dataset.task) return;
      const dragT=state.tasks.find(x=>x.id===dragId); const overT=state.tasks.find(x=>x.id===row.dataset.task);
      if(!dragT||!overT) return;
      dragT.projectId=overT.projectId; dragT.sectionId=overT.sectionId;
      const peers = sortTasks(state.tasks.filter(x=>x.projectId===overT.projectId && x.sectionId===overT.sectionId && x.id!==dragId));
      const idx = peers.findIndex(x=>x.id===overT.id);
      peers.splice(idx,0,dragT);
      peers.forEach((p,i)=>p.order=i);
      persist(); render();
    });
  });
}

let toastTimer=null;
function toast(msg, actionLabel, actionFn) {
  const root=$('#toast-root'); root.innerHTML='';
  const el=document.createElement('div'); el.className='toast';
  el.innerHTML = `<span>${esc(msg)}</span>`;
  if(actionLabel){ const b=document.createElement('button'); b.textContent=actionLabel; b.onclick=()=>{ actionFn&&actionFn(); root.innerHTML=''; }; el.appendChild(b); }
  root.appendChild(el);
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>root.innerHTML='', 4000);
}

// ============================================================
modalRoot.addEventListener('click', e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const a=el.dataset.act, id=el.dataset.id;
  if(a==='close-modal') closeModal();
  else if(a==='save-task') saveTaskDetail(id);
  else if(a==='delete-task'){ if(confirm('Delete this task?')){ deleteTask(id); closeModal(); } }
  else if(a==='save-project') saveProject(id);
  else if(a==='delete-project'){ if(confirm('Delete project and its tasks?')) deleteProject(id); }
  else if(a==='save-label') saveLabel(id);
  else if(a==='delete-label'){ const l=getLabel(id); state.tasks.forEach(t=>t.labels=t.labels.filter(x=>x!==id)); state.labels=state.labels.filter(x=>x.id!==id); if(ui.labelName===(l&&l.name)){ui.view='today';} persist(); closeModal(); render(); }
  else if(a==='save-filter') saveFilter(id);
  else if(a==='delete-filter'){ state.filters=state.filters.filter(x=>x.id!==id); if(ui.filterId===id)ui.view='today'; persist(); closeModal(); render(); }
  else if(a==='save-section') saveSection(id);
  else if(a==='add-comment'){ const inp=$('#d-newcomment'); if(inp.value.trim()){ state.comments.push({id:uid('cm'),taskId:id,text:inp.value.trim(),author:state.settings.userName,createdAt:Date.now()}); persist(); openTaskDetail(id); } }

// ============================================================
function matrixQuadrant(t) {
  const urgent = t.dueDate && dayDiff(t.dueDate, todayStr())<=0;       // overdue or due today
  const important = (t.priority||4) <= 2;
  if (urgent && important) return 'do';
  if (!urgent && important) return 'schedule';
  if (urgent && !important) return 'delegate';
  return 'eliminate';
}
function matrixViewHtml() {
  const open = state.tasks.filter(t=>!t.parentId && !t.completed);
  const q = { do:[], schedule:[], delegate:[], eliminate:[] };
  open.forEach(t=>q[matrixQuadrant(t)].push(t));
  const card = t=>`<div class="mx-card p${t.priority}" data-task="${t.id}" draggable="true"><div class="checkbox ${t.priority<4?'p'+t.priority:''}" data-check="${t.id}">✓</div><span>${esc(t.title)}</span></div>`;
  const quad = (key,title,sub,cls)=>`<div class="mx-quad ${cls}" data-quad="${key}">
    <div class="mx-head"><b>${title}</b> <span class="mx-sub">${sub}</span><span class="gcount">${q[key].length}</span></div>
    <div class="mx-cards" data-quaddrop="${key}">${q[key].map(card).join('')||'<div class="mx-empty">—</div>'}</div></div>`;
  return `<div class="view-title-row"><div class="view-title"><span class="emoji">🎯</span>Priority Matrix</div></div>
    <div class="view-sub">Urgent = due today/overdue · Important = P1–P2. Drag a task to change its quadrant.</div>
    <div class="mx-grid">
      ${quad('do','Do First','Urgent & Important','q-do')}
      ${quad('schedule','Schedule','Important, Not Urgent','q-sch')}
      ${quad('delegate','Delegate','Urgent, Not Important','q-del')}
      ${quad('eliminate','Eliminate','Neither','q-eli')}
    </div>`;
}
function applyMatrixMove(taskId, quad) {
  const t = state.tasks.find(x=>x.id===taskId); if(!t) return;
  const today = todayStr();
  if (quad==='do'){ t.priority=1; if(!t.dueDate||dayDiff(t.dueDate,today)>0) t.dueDate=today; }
  else if (quad==='schedule'){ t.priority=2; if(t.dueDate && dayDiff(t.dueDate,today)<=0) t.dueDate=addDays(today,1); if(!t.dueDate) t.dueDate=addDays(today,1); }
  else if (quad==='delegate'){ t.priority=3; if(!t.dueDate||dayDiff(t.dueDate,today)>0) t.dueDate=today; }
  else { t.priority=4; }
  persist(); render();
}

function statCard(icon,label,val){ return `<div class="stat-card"><div class="stat-ico">${icon}</div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`; }
function heatmapHtml(weeks) {
  const today = parseYmd(todayStr());
  // align to weeks; start on Sunday
  const end = new Date(today); const start = new Date(today); start.setDate(start.getDate()-(weeks*7-1)-end.getDay());
  let max=1; const counts={};
  Object.entries(state.activity).forEach(([d,n])=>{ counts[d]=n; if(n>max)max=n; });
  let cols='';
  let cur = new Date(start);
  for (let w=0; w<weeks+1; w++) {
    let cells='';
    for (let dow=0; dow<7; dow++) {
      const ds = ymd(cur);
      const n = counts[ds]||0;
      const lvl = n===0?0:n>=max*0.75?4:n>=max*0.5?3:n>=max*0.25?2:1;
      const future = cur>today;
      cells += `<div class="hm-cell hm-l${lvl} ${future?'hm-future':''}" title="${ds}: ${n} done"></div>`;
      cur.setDate(cur.getDate()+1);
    }
    cols += `<div class="hm-col">${cells}</div>`;
  }
  return `<div class="hm-wrap">${cols}</div><div class="hm-legend">Less <span class="hm-cell hm-l0"></span><span class="hm-cell hm-l1"></span><span class="hm-cell hm-l2"></span><span class="hm-cell hm-l3"></span><span class="hm-cell hm-l4"></span> More</div>`;
}

function toggleSelect(id){ if(ui.selected.has(id)) ui.selected.delete(id); else ui.selected.add(id); render(); }
function rangeSelect(id){
  // select a contiguous run in the current DOM order
  const rows=[...document.querySelectorAll('#main [data-task]')].map(e=>e.dataset.task);
  const anchor = rows.find(r=>ui.selected.has(r));
  const i1=rows.indexOf(anchor), i2=rows.indexOf(id);
  if(i1<0||i2<0){ ui.selected.add(id); render(); return; }
  const [a,b]=[Math.min(i1,i2),Math.max(i1,i2)];
  for(let i=a;i<=b;i++) ui.selected.add(rows[i]);
  render();
}
function bulkApply(action) {
  const ids = [...ui.selected];
  if (action==='clear'){ ui.selected.clear(); render(); return; }
  if (action==='delete'){ if(!confirm('Delete '+ids.length+' tasks?')) return; ids.forEach(id=>{ const subs=subtasks(id).map(s=>s.id); state.tasks=state.tasks.filter(t=>t.id!==id&&!subs.includes(t.id)); }); ui.selected.clear(); persist(); render(); toast('Deleted'); return; }
  if (action==='move'){ openBulkMove(ids); return; }
  ids.forEach(id=>{ const t=state.tasks.find(x=>x.id===id); if(!t) return;
    if(action==='complete'){ if(!t.completed && !isBlocked(t)){ t.completed=true; t.completedAt=Date.now(); onCompletion(t); } }
    else if(action==='today') t.dueDate=todayStr();
    else if(action==='tomorrow') t.dueDate=addDays(todayStr(),1);
    else if(action==='p1') t.priority=1;
  });
  if(action==='complete'){ playSound('complete'); }
  ui.selected.clear(); persist(); render();
}

  let len=25;

  $('#focus-start').onclick=()=>{ const id=$('#focus-task').value; if(!id) return; closeModal(); startFocus(id, len); };

function startFocus(taskId, minutes) {
  stopFocus(true);
  const t = state.tasks.find(x=>x.id===taskId); if(!t) return;
  let remaining = minutes*60; const totalSec=remaining;
  document.body.classList.add('focus-mode');
  const bar = document.createElement('div'); bar.id='focus-bar';
  document.body.appendChild(bar);
  function paint(){
    const mm=String(Math.floor(remaining/60)).padStart(2,'0'), ss=String(remaining%60).padStart(2,'0');
    const pct=Math.round((1-remaining/totalSec)*100);
    bar.innerHTML = `<div class="fb-ring"><svg viewBox="0 0 36 36"><path class="fb-bg" d="M18 2a16 16 0 1 1 0 32 16 16 0 0 1 0-32"/><path class="fb-fg" stroke-dasharray="${pct},100" d="M18 2a16 16 0 1 1 0 32 16 16 0 0 1 0-32"/></svg><span class="fb-time">${mm}:${ss}</span></div>
      <div class="fb-info"><div class="fb-task">🍅 ${esc(t.title)}</div><div class="fb-actions"><button data-fb="done">✓ Done</button><button data-fb="stop">Stop</button></div></div>`;
    bar.querySelector('[data-fb="stop"]').onclick=()=>stopFocus();
    bar.querySelector('[data-fb="done"]').onclick=()=>{ stopFocus(); toggleComplete(taskId); };
  }
  paint();
  focusTimer = setInterval(()=>{
    remaining--; t.timeSpent=(t.timeSpent||0)+1;
    if (remaining<=0) { state.stats._focusDone=true; checkAchievements(); persist(); stopFocus(); confettiBurst(); playSound('fanfare'); toast('🍅 Focus complete! '+minutes+' min logged to “'+t.title+'”'); render(); return; }
    if (remaining%15===0) persist();
    paint();
  }, 1000);
}
function stopFocus(silent) {
  if (focusTimer){ clearInterval(focusTimer); focusTimer=null; }
  document.body.classList.remove('focus-mode');
  const bar=document.getElementById('focus-bar'); if(bar) bar.remove();
  if(!silent) persist();
}
function fmtDuration(sec){ sec=Math.round(sec||0); if(sec<60) return sec+'s'; const m=Math.floor(sec/60); if(m<60) return m+'m'; return Math.floor(m/60)+'h '+(m%60)+'m'; }

// ============================================================
//  FEATURE: Plan My Day (auto-scheduler) + day budget
// ============================================================
function planMyDay() {
  const today = todayStr();
  const start = state.settings.dayStart||9, end = state.settings.dayEnd||18;
  // candidates: open, not blocked, due today or overdue or no date; skip already-timed today
  let cands = state.tasks.filter(t=>!t.parentId && !t.completed && !isBlocked(t) &&
    (!t.dueDate || dayDiff(t.dueDate,today)<=0))
    .filter(t=>!(t.dueDate===today && t.dueTime));
  cands.sort((a,b)=>(a.priority-b.priority) || ((b.estimate||30)-(a.estimate||30)));
  let cursor = start*60;   // minutes from midnight
  const endM = end*60; let placed=0, skipped=0;
  for (const t of cands) {
    const dur = Math.max(15, Math.min(180, t.estimate||30));
    if (cursor + dur > endM) { skipped++; continue; }
    const hh = String(Math.floor(cursor/60)).padStart(2,'0'), mm = String(cursor%60).padStart(2,'0');
    t.dueDate = today; t.dueTime = `${hh}:${mm}`;
    cursor += dur;
    // round up to next 15 min
    if (cursor%15) cursor += 15-(cursor%15);
    placed++;
  }
  persist(); ui.view='planner'; render();
  toast(`🗓️ Planned ${placed} task${placed===1?'':'s'} into your day` + (skipped?` · ${skipped} didn't fit`:''));
  if (placed) { playSound('complete'); }
}
function dayBudgetHtml() {
  const today = todayStr();
  const todays = state.tasks.filter(t=>!t.parentId && !t.completed && t.dueDate===today);
  const est = todays.reduce((s,t)=>s+(t.estimate||0),0);
  const avail = ((state.settings.dayEnd||18)-(state.settings.dayStart||9))*60;
  const pct = Math.min(100, Math.round(est/avail*100));
  const over = est>avail;
  return `<div class="budget"><div class="budget-top"><span><b>${todays.length}</b> tasks today · est <b>${fmtEst(est)||'0m'}</b> of ${fmtEst(avail)} available</span>
    <button class="btn primary" data-act="plan-my-day" style="padding:6px 12px">✨ Plan My Day</button></div>
    <div class="budget-bar"><div class="budget-fill ${over?'over':''}" style="width:${pct}%"></div></div>
    ${over?`<div class="budget-warn">⚠ Over capacity by ${fmtEst(est-avail)} — consider rescheduling some tasks.</div>`:''}</div>`;
}

// ============================================================
//  FEATURE: Auto carry-over overdue
// ============================================================
function maybeAutoCarry() {
  if (!state.settings.autoCarry) return;
  const today = todayStr();
  if (state.settings.lastCarry === today) return;
  let n=0;
  state.tasks.forEach(t=>{ if(!t.completed && !t.parentId && t.dueDate && dayDiff(t.dueDate,today)<0 && !t.recurrence){ t.dueDate=today; n++; } });
  state.settings.lastCarry = today;
  persist();
  if (n) setTimeout(()=>toast(`↪ Carried ${n} overdue task${n===1?'':'s'} to today`), 600);
}

function openWeeklyReview() {
  const today = todayStr();
  const steps = [
    { title:'📥 Process your Inbox', build:()=>{
        const inbox = state.tasks.filter(t=>t.projectId==='inbox'&&!t.completed&&!t.parentId);

      } },
    { title:'⏰ Reschedule overdue', build:()=>{
        const od = state.tasks.filter(t=>!t.completed&&!t.parentId&&t.dueDate&&dayDiff(t.dueDate,today)<0);
        if(!od.length) return '<div class="wr-empty">No overdue tasks. You\'re on top of it. ✨</div>';

      } },
    { title:'✅ Wins this week', build:()=>{
        const wk = state.tasks.filter(t=>t.completed&&t.completedAt&&(Date.now()-t.completedAt)<7*86400000);
        const xpWk = wk.reduce((s,t)=>s+xpFor(t),0);
        return `<div class="wr-cele"><div class="wr-big">${wk.length}</div><div>tasks completed in the last 7 days · ~${xpWk} XP</div><div style="margin-top:8px;color:var(--text-dim)">🔥 Current streak: ${state.stats.streak} days · Level ${state.stats.level}</div></div>` +
          (wk.length?`<div class="wr-winlist">${wk.slice(0,12).map(t=>`<div class="wr-win">✓ ${esc(t.title)}</div>`).join('')}</div>`:'');
      } },
    { title:'🗓 The week ahead', build:()=>{
        const up = state.tasks.filter(t=>!t.completed&&!t.parentId&&t.dueDate&&dayDiff(t.dueDate,today)>=0&&dayDiff(t.dueDate,today)<7).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
        if(!up.length) return '<div class="wr-empty">Nothing scheduled this week yet.</div>';
        return up.map(t=>`<div class="wr-row"><span>${esc(t.title)}</span><span class="wr-old">${esc(fmtDate(t.dueDate))}</span></div>`).join('');
      } },
  ];
  let i = 0;
  function draw() {
    const s = steps[i];
    modalRoot.innerHTML = `<div class="overlay"><div class="modal wide"><div class="modal-head"><div class="crumbs">🔄 Weekly Review · Step ${i+1} of ${steps.length}</div><button class="icon-btn" data-act="close-modal">✕</button></div>
      <div class="modal-body"><div class="wr-title">${s.title}</div><div class="wr-prog"><div style="width:${(i+1)/steps.length*100}%"></div></div><div class="wr-content">${s.build()}</div></div>
      <div class="modal-foot"><button class="btn ghost" id="wr-back" ${i===0?'disabled':''}>Back</button><span style="flex:1"></span><button class="btn primary" id="wr-next">${i===steps.length-1?'Finish 🎉':'Next →'}</button></div></div></div>`;
    modalRoot.querySelectorAll('[data-wr-today]').forEach(b=>b.onclick=()=>{ const t=state.tasks.find(x=>x.id===b.dataset.wrToday); if(t){t.dueDate=today;persist();draw();} });
    modalRoot.querySelectorAll('[data-wr-tom]').forEach(b=>b.onclick=()=>{ const t=state.tasks.find(x=>x.id===b.dataset.wrTom); if(t){t.dueDate=addDays(today,1);persist();draw();} });
    modalRoot.querySelectorAll('[data-wr-nodate]').forEach(b=>b.onclick=()=>{ const t=state.tasks.find(x=>x.id===b.dataset.wrNodate); if(t){t.dueDate=null;persist();draw();} });
    modalRoot.querySelectorAll('[data-wr-open]').forEach(b=>b.onclick=()=>openTaskDetail(b.dataset.wrOpen));
    $('#wr-back').onclick=()=>{ if(i>0){i--;draw();} };
    $('#wr-next').onclick=()=>{ if(i<steps.length-1){i++;draw();} else { closeModal(); confettiBurst(); playSound('fanfare'); toast('🔄 Weekly review complete!'); render(); } };
  }
  draw();
}

const STATUSES = [
  { k:'todo', label:'To do', color:'#94a3b8', icon:'○' },
  { k:'inprogress', label:'In progress', color:'#3b82f6', icon:'◐' },
  { k:'inreview', label:'In review', color:'#a855f7', icon:'◑' },
  { k:'blocked', label:'Blocked', color:'#ef4444', icon:'⊘' },
  { k:'done', label:'Done', color:'#10b981', icon:'●' },
];
const statusDef = k => STATUSES.find(s=>s.k===k) || STATUSES[0];
function statusChipHtml(t){ const s=statusDef(t.status); return `<span class="status-chip" style="color:${s.color};border-color:${s.color}">${s.icon} ${s.label}</span>`; }
function setStatus(id, k) {
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  t.status = k;
  if (k==='done' && !t.completed) { t.completed=true; t.completedAt=Date.now(); onCompletion(t); announceUnblocked(t.id); playSound('complete'); logActivity('completed', t.id, t.title); }
  else if (k!=='done' && t.completed) { t.completed=false; t.completedAt=null; undoCompletion(t); }
  logActivity('status', t.id, t.title+' → '+statusDef(k).label);
  persist(); render();
}

//  FEATURE: Activity log / audit trail
// ============================================================
function logActivity(type, taskId, text) {
  state.activityLog = state.activityLog || [];
  state.activityLog.unshift({ id:uid('act'), ts:Date.now(), type, taskId, text:String(text||'').slice(0,120) });
  if (state.activityLog.length>500) state.activityLog.length=500;   // cap
}
const ACT_ICON = { created:'➕', completed:'✓', status:'🔀', deleted:'🗑', edited:'✎', moved:'📁', comment:'💬', goal:'🎯' };
function activityViewHtml() {
  const log = state.activityLog||[];
  const rows = log.slice(0,200).map(a=>`<div class="act-row"><span class="act-ico">${ACT_ICON[a.type]||'•'}</span>
    <span class="act-text">${esc(a.text)}</span><span class="act-time">${relTime(a.ts)}</span></div>`).join('');
  return `<div class="view-title-row"><div class="view-title"><span class="emoji">📜</span>Activity</div>
    <div class="view-actions"><button class="btn ghost" data-act="clear-activity" style="padding:6px 12px">Clear</button></div></div>
    <div class="view-sub">A running audit trail of changes in this workspace (most recent first).</div>
    ${rows || '<div class="empty-state"><div class="big">🗒️</div>No activity yet.</div>'}`;
}
function relTime(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60)return s+'s ago'; const m=Math.floor(s/60); if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; const d=Math.floor(h/24); if(d<7)return d+'d ago'; return fmtDate(ymd(new Date(ts))); }

// ============================================================
//  FEATURE: Automations (lightweight rule engine)
// ============================================================
function applyAutomations(t) {
  (state.automations||[]).forEach(r=>{
    if (r.projectId && t.projectId!==r.projectId) return;
    if (r.keyword && !(t.title+' '+t.description).toLowerCase().includes(r.keyword.toLowerCase())) return;
    const set = r.set||{};
    if (set.assignee!=null && !t.assignee) t.assignee = set.assignee;
    if (set.priority!=null) t.priority = set.priority;
    if (set.labelId && !t.labels.includes(set.labelId)) t.labels.push(set.labelId);
    if (set.status) t.status = set.status;
  });
}

function goalProgress(g) {
  let pool = state.tasks.filter(t=>!t.parentId);
  if (g.scope==='project') pool = pool.filter(t=>t.projectId===g.refId);
  else if (g.scope==='label') pool = pool.filter(t=>t.labels.includes(g.refId));
  const done = pool.filter(t=>t.completed && (!g.since || (t.completedAt||0)>=g.since)).length;
  return { done, target:g.target||1 };
}
function goalsViewHtml() {
  const cards = (state.goals||[]).map(g=>{
    const {done,target}=goalProgress(g); const pct=Math.min(100,Math.round(done/target*100));
    const scopeLbl = g.scope==='project'?(getProject(g.refId)||{}).name : g.scope==='label'?'@'+((getLabel(g.refId)||{}).name||'') : 'All tasks';
    return `<div class="goal-card"><div class="goal-head"><b>${esc(g.name)}</b><button class="icon-btn" data-delgoal="${g.id}">🗑</button></div>

      <div class="goal-meta">${done} / ${target} ${done>=target?'✓ achieved':''}</div></div>`;
  }).join('');
  return `<div class="view-title-row"><div class="view-title"><span class="emoji">🎯</span>Goals</div>
    <div class="view-actions"><button class="btn primary" data-act="add-goal" style="padding:6px 12px">+ New goal</button></div></div>

}

// ============================================================
//  FEATURE: Timeline / Gantt
// ============================================================
function timelineViewHtml() {
  const tasks = state.tasks.filter(t=>!t.parentId && !t.completed && (t.dueDate||t.deadline)).slice(0,60);
  if (!tasks.length) return `<div class="view-title-row"><div class="view-title"><span class="emoji">📐</span>Timeline</div></div><div class="empty-state"><div class="big">📐</div>Add due dates to tasks to see them on the timeline.</div>`;
  const ends = tasks.map(t=>t.deadline||t.dueDate);
  const starts = tasks.map(t=>{ const end=t.deadline||t.dueDate; const days=Math.ceil((t.estimate||60)/ (60*4)); return addDays(end,-Math.max(1,days)); });
  let min = [...starts, todayStr()].sort()[0];
  let max = [...ends, todayStr()].sort().slice(-1)[0];
  const span = Math.max(7, dayDiff(max,min)+2);
  const colW = 34;
  // header days
  let head=''; for(let i=0;i<span;i++){ const d=addDays(min,i); head+=`<div class="tl-day ${d===todayStr()?'tl-today':''}" style="width:${colW}px">${parseYmd(d).getDate()}</div>`; }
  const rows = tasks.map((t,idx)=>{
    const end=t.deadline||t.dueDate; const start=starts[idx];
    const off=dayDiff(start,min), w=Math.max(1,dayDiff(end,start)+1);
    const c=statusDef(t.status).color;
    return `<div class="tl-row"><div class="tl-label" title="${esc(t.title)}">${t.milestone?'★ ':''}${esc(t.title)}</div>
      <div class="tl-track" style="width:${span*colW}px"><div class="tl-bar" data-task="${t.id}" style="left:${off*colW}px;width:${w*colW-4}px;background:${c}">${t.deadline?'⏰':''}${esc(t.title)}</div></div></div>`;
  }).join('');
  return `<div class="view-title-row"><div class="view-title"><span class="emoji">📐</span>Timeline</div></div>
    <div class="view-sub">Gantt view — bar length reflects estimate; ⏰ marks a hard deadline. Click a bar to open.</div>
    <div class="tl-wrap"><div class="tl-head"><div class="tl-label"></div><div class="tl-track" style="width:${span*colW}px;display:flex">${head}</div></div>${rows}</div>`;
}

// ============================================================

function reportsViewHtml() {
  const open = state.tasks.filter(t=>!t.parentId && !t.completed);
  const doneAll = state.tasks.filter(t=>!t.parentId && t.completed);
  const rate = (doneAll.length+open.length)? Math.round(doneAll.length/(doneAll.length+open.length)*100):0;
  // per project completion
  const proj = [getProject('inbox'),...activeProjects()].map(p=>{ const o=state.tasks.filter(t=>t.projectId===p.id&&!t.parentId&&!t.completed).length; const d=state.tasks.filter(t=>t.projectId===p.id&&!t.parentId&&t.completed).length; return {p,o,d,r:(o+d)?Math.round(d/(o+d)*100):0}; }).filter(x=>x.o+x.d>0);
  const projRows = proj.map(x=>`<div class="stat-prow"><span class="stat-pname"><span class="proj-dot" style="background:${x.p.color}"></span>${esc(x.p.name)}</span><div class="stat-pbar"><div style="width:${x.r}%;background:${x.p.color}"></div></div><span class="stat-pn">${x.r}%</span></div>`).join('');
  // per assignee
  const people={}; state.tasks.filter(t=>!t.parentId&&t.assignee).forEach(t=>{ const a=t.assignee; people[a]=people[a]||{open:0,done:0}; if(t.completed)people[a].done++; else people[a].open++; });
  const peopleRows = Object.entries(people).map(([n,v])=>`<div class="rep-row"><span class="avatar" style="width:24px;height:24px;font-size:11px">${esc(n[0].toUpperCase())}</span><span style="flex:1">${esc(n)}</span><span class="pill">${v.open} open</span><span class="pill">${v.done} done</span></div>`).join('') || '<div style="color:var(--text-faint)">No assignees yet.</div>';
  // timesheet
  const tracked = state.tasks.filter(t=>t.timeSpent).sort((a,b)=>b.timeSpent-a.timeSpent).slice(0,10);
  const totalTime = state.tasks.reduce((s,t)=>s+(t.timeSpent||0),0);
  const tsRows = tracked.map(t=>`<div class="rep-row"><span style="flex:1">${esc(t.title)}</span><span class="pill">${fmtDuration(t.timeSpent)}</span></div>`).join('') || '<div style="color:var(--text-faint)">No time tracked yet — use the Focus timer.</div>';
  return `<div class="view-title-row"><div class="view-title"><span class="emoji">📈</span>Reports</div>
    <div class="view-actions"><button class="btn ghost" data-act="export-csv" style="padding:6px 12px">⤓ CSV</button><button class="btn ghost" data-act="export-ics" style="padding:6px 12px">📅 .ics</button></div></div>
    <div class="stat-cards">
      ${statCard('✅','Completion rate',rate+'%')}
      ${statCard('📋','Open',open.length)}
      ${statCard('🏁','Done',doneAll.length)}
      ${statCard('⏱','Time tracked',fmtDuration(totalTime))}
    </div>
    <div class="stat-panel"><div class="stat-panel-head"><b>Completion rate by project</b></div>${projRows||'<div style="color:var(--text-faint)">No data.</div>'}</div>
    <div class="stat-panel"><div class="stat-panel-head"><b>Resource report (by assignee)</b></div>${peopleRows}</div>
    <div class="stat-panel"><div class="stat-panel-head"><b>Timesheet (most-tracked tasks)</b></div>${tsRows}</div>`;
}
function exportCsv() {
  const cols=['title','project','status','priority','dueDate','deadline','assignee','estimate','timeSpent','completed','labels'];
  const rows=[cols.join(',')];
  state.tasks.filter(t=>!t.parentId).forEach(t=>{
    const vals=[t.title,(getProject(t.projectId)||{}).name||'',t.status,'P'+t.priority,t.dueDate||'',t.deadline||'',t.assignee||'',t.estimate||'',t.timeSpent||'',t.completed?'yes':'no',t.labels.map(id=>(getLabel(id)||{}).name).filter(Boolean).join(' ')];
    rows.push(vals.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  });
  downloadBlob(rows.join('\n'),'taskflow-tasks.csv','text/csv');
  toast('⤓ Exported CSV');
}
function exportIcs() {
  const pad=n=>String(n).padStart(2,'0');
  let lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//TaskFlow//EN'];
  state.tasks.filter(t=>!t.parentId && t.dueDate && !t.completed).forEach(t=>{
    const d=t.dueDate.replace(/-/g,''); const dt = t.dueTime? d+'T'+t.dueTime.replace(':','')+'00' : d;
    lines.push('BEGIN:VEVENT','UID:'+t.id+'@taskflow', t.dueTime?('DTSTART:'+dt):('DTSTART;VALUE=DATE:'+d), 'SUMMARY:'+t.title.replace(/[\n,;]/g,' '), 'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  downloadBlob(lines.join('\r\n'),'taskflow.ics','text/calendar');
  toast('📅 Exported calendar (.ics)');
}
function downloadBlob(content, filename, type) {
  const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

function openAutomations() {
  const rows=(state.automations||[]).map(r=>`<div class="tpl-row"><div class="tpl-info"><b>${esc(r.name||'Rule')}</b><span class="tpl-meta">${r.projectId?'in '+esc((getProject(r.projectId)||{}).name||''):'any project'}${r.keyword?' · contains “'+esc(r.keyword)+'”':''} → ${esc(describeSet(r.set))}</span></div><button class="icon-btn" data-delauto="${r.id}">🗑</button></div>`).join('');
  const projOpts=activeProjects().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const labOpts=state.labels.map(l=>`<option value="${l.id}">@${esc(l.name)}</option>`).join('');
  modalRoot.innerHTML=`<div class="overlay"><div class="modal"><div class="modal-head"><div class="crumbs">⚙ Automations</div><button class="icon-btn" data-act="close-modal">✕</button></div>
    <div class="modal-body"><div class="view-sub" style="padding-bottom:8px">When a new task is created, automatically apply changes.</div>${rows}
      <div class="detail-section-title">New rule</div>
      <div class="field"><label>Name</label><input type="text" id="au-name" placeholder="e.g. Tag work tasks urgent"></div>
      <div class="row2"><div class="field"><label>In project (optional)</label><select id="au-proj"><option value="">Any</option>${projOpts}</select></div>
      <div class="field"><label>Title contains (optional)</label><input type="text" id="au-kw" placeholder="keyword"></div></div>
      <div class="row2"><div class="field"><label>Set priority</label><select id="au-pri"><option value="">—</option><option value="1">P1</option><option value="2">P2</option><option value="3">P3</option><option value="4">P4</option></select></div>
      <div class="field"><label>Add label</label><select id="au-lbl"><option value="">—</option>${labOpts}</select></div></div>
      <div class="field"><label>Set assignee</label><input type="text" id="au-assignee" placeholder="name"></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" data-act="close-modal">Close</button><button class="btn primary" id="au-add">Add rule</button></div></div></div>`;
  modalRoot.querySelectorAll('[data-delauto]').forEach(el=>el.onclick=()=>{ state.automations=state.automations.filter(r=>r.id!==el.dataset.delauto); persist(); openAutomations(); });
  $('#au-add').onclick=()=>{ const set={}; if($('#au-pri').value)set.priority=+$('#au-pri').value; if($('#au-lbl').value)set.labelId=$('#au-lbl').value; if($('#au-assignee').value.trim())set.assignee=$('#au-assignee').value.trim();
    if(!Object.keys(set).length){ toast('Pick at least one action'); return; }
    state.automations.push({ id:uid('auto'), name:$('#au-name').value.trim()||'Rule', projectId:$('#au-proj').value||null, keyword:$('#au-kw').value.trim()||null, set }); persist(); openAutomations(); };
}
function describeSet(set){ const p=[]; if(set.priority)p.push('P'+set.priority); if(set.labelId)p.push('+@'+((getLabel(set.labelId)||{}).name||'')); if(set.assignee)p.push('assign '+set.assignee); if(set.status)p.push(set.status); return p.join(', ')||'—'; }
function openCustomFields() {
  const rows=(state.customFields||[]).map(f=>`<div class="tpl-row"><div class="tpl-info"><b>${esc(f.name)}</b><span class="tpl-meta">${esc(f.type)}${f.options?' · '+esc(f.options.join(', ')):''}</span></div><button class="icon-btn" data-delcf="${f.id}">🗑</button></div>`).join('');
  modalRoot.innerHTML=`<div class="overlay"><div class="modal"><div class="modal-head"><div class="crumbs">🧩 Custom fields</div><button class="icon-btn" data-act="close-modal">✕</button></div>
    <div class="modal-body"><div class="view-sub" style="padding-bottom:8px">Add fields that appear on every task.</div>${rows}
      <div class="detail-section-title">New field</div>
      <div class="row2"><div class="field"><label>Name</label><input type="text" id="cf-name" placeholder="e.g. Story points"></div>
      <div class="field"><label>Type</label><select id="cf-type"><option value="text">Text</option><option value="number">Number</option><option value="select">Select</option></select></div></div>
      <div class="field"><label>Options (for Select, comma-separated)</label><input type="text" id="cf-opts" placeholder="Low, Medium, High"></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" data-act="close-modal">Close</button><button class="btn primary" id="cf-add">Add field</button></div></div></div>`;
  modalRoot.querySelectorAll('[data-delcf]').forEach(el=>el.onclick=()=>{ state.customFields=state.customFields.filter(f=>f.id!==el.dataset.delcf); persist(); openCustomFields(); });
  $('#cf-add').onclick=()=>{ const name=$('#cf-name').value.trim(); if(!name)return; const type=$('#cf-type').value;
    const f={ id:uid('cf'), name, type }; if(type==='select')f.options=$('#cf-opts').value.split(',').map(s=>s.trim()).filter(Boolean);
    state.customFields.push(f); persist(); openCustomFields(); };
}

// ============================================================
//  GLOBAL
// ============================================================
function applyTheme(){ document.documentElement.setAttribute('data-theme', state.settings.theme==='dark'?'dark':'light'); }

// ---------- Mobile drawer ----------
function setDrawer(open){ ui.drawerOpen=open; applyAppClasses(); }
function applyAppClasses(){
  const app=$('#app'); if(!app) return;
  app.classList.toggle('drawer-open', !!ui.drawerOpen);
  app.classList.toggle('m-search', !!ui.mSearch);
  $('#scrim').classList.toggle('show', !!ui.drawerOpen);
}
$('#scrim').addEventListener('click', ()=>setDrawer(false));

// ---------- Bottom nav (mobile) ----------
const BOTTOM_NAV = [
  { key:'today', icon:'📅', label:'Today' },
  { key:'upcoming', icon:'🗓', label:'Upcoming' },
  { key:'__add', icon:'+', label:'Add' },
  { key:'inbox', icon:'📥', label:'Inbox' },
  { key:'__search', icon:'🔍', label:'Search' },
];
function renderBottomNav(){
  const el=$('#bottomnav');
  el.innerHTML = BOTTOM_NAV.map(i=>{
    const isAdd = i.key==='__add';
    const active = (i.key===ui.view && !ui.search) || (i.key==='__search'&&ui.mSearch);
    return `<button class="bn-item ${isAdd?'bn-add':''} ${active?'active':''}" data-bn="${i.key}">
      <span class="bn-ico">${i.icon}</span><span class="bn-label">${i.label}</span></button>`;
  }).join('');
  el.querySelectorAll('[data-bn]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.bn;
    if(k==='__add'){ openQuickAdd(); return; }
    if(k==='__search'){ ui.mSearch=true; applyAppClasses(); setTimeout(()=>{const s=$('#search'); if(s)s.focus();},50); return; }
    ui.view=k; ui.projectId=null; ui.labelName=null; ui.filterId=null; ui.search=''; ui.mSearch=false; setDrawer(false); render();
  });
}

function render(){ closeMenuEl(); renderSidebar(); renderMain(); wireSidebar(); renderBottomNav(); applyAppClasses(); }

document.addEventListener('keydown', e=>{
  // Command palette works even from inputs
  if ((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')) { e.preventDefault(); openCommandPalette(); return; }
  if (e.target.matches('input,textarea')) {
    if (e.key==='Escape') e.target.blur();
    return;
  }
  if (e.key==='q'){ e.preventDefault(); openQuickAdd(); }
  else if (e.key==='/' ){ e.preventDefault(); const s=$('#search'); if(s)s.focus(); }
  else if (e.key==='f' && state.tasks.some(t=>!t.completed)){ e.preventDefault(); openFocusPicker(); }
  else if (e.key==='Escape'){ closeModal(); closeMenuEl(); if(ui.selected.size){ui.selected.clear();render();} else if(ui.search){ui.search='';render();} }
});

// Night-owl achievement: completing anything after midnight (00:00–04:00)
function checkNightOwl(){ const h=new Date().getHours(); if(h>=0&&h<4) state.stats._nightOwl=true; }

// ---------- Due-task notifications ----------
function startNotificationLoop() {
  setInterval(()=>{
    if (!state.settings.notifications || Notification.permission!=='granted') return;
    const now=new Date(); const today=todayStr(); const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    state.tasks.forEach(t=>{
      if (t.completed || t.parentId || t._notified) return;
      const dueNow = t.dueDate===today && t.dueTime && t.dueTime<=hm;
      const dueAllDay = t.dueDate===today && !t.dueTime && now.getHours()>=9;
      if (dueNow || dueAllDay) { t._notified=true; try{ new Notification('TaskFlow — due', { body:t.title, icon:ICON_URI }); }catch(e){} }
    });
  }, 30000);
}
const ICON_URI = "data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='112'%20fill='%236d5dfc'/%3E%3Cpath%20d='M150%20268l70%2070%20142-152'%20fill='none'%20stroke='%23fff'%20stroke-width='46'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E";

// ---------- PWA service worker ----------
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

applyTheme();
applyAccent(state.settings.accent, state.settings.themePreset);
checkNightOwl();
maybeAutoCarry();
initRealtime();
render();
handleShareHash();
if (state.settings.passcode) showLockScreen();
startNotificationLoop();
initSync();
window.addEventListener('beforeunload', persist);
</script>
</body>
